server {
    listen 80;
    server_name localhost;

    root /var/www/html/app;
    index index.html;

    location ~ ^/(dist|paginas|assets|resources|node_modules)(/|$) {
        try_files $uri $uri/ =404;
    }

    # /<slug> -> /front/<slug> (el front navega bajo /front/<slug> en local)
    location ~ ^/([a-zA-Z0-9_-]+)/?$ {
        return 302 $scheme://$http_host/front/$1;
    }

    # Compatibilidad local con rutas legacy usadas por JS en localhost
    location ^~ /URBE-API-DRIVEN/front/ {
        rewrite ^/URBE-API-DRIVEN/front/(.*)$ /front/$1 last;
    }
    # ../../dist desde /URBE-API-DRIVEN/front/admin/dashboard -> /URBE-API-DRIVEN/dist/...
    location ^~ /URBE-API-DRIVEN/dist/ {
        rewrite ^/URBE-API-DRIVEN/dist/(.*)$ /dist/$1 last;
    }
    location ^~ /URBE-API-DRIVEN/api {
        rewrite ^/URBE-API-DRIVEN/api/?(.*)$ /api/$1 last;
    }

    # /front/<slug> => /index.html?inst=<slug>
    location ~ ^/front/([a-zA-Z0-9_-]+)/?$ {
        rewrite ^/front/([a-zA-Z0-9_-]+)/?$ /index.html?inst=$1 last;
    }

    # /front/admin|usuario|superadmin/... -> /admin|.../... (luego se resuelve a paginas/)
    location ~ ^/front/(admin|usuario|superadmin)(/.*)?$ {
        rewrite ^/front/(.*)$ /$1 last;
    }

    # Rutas de app sin .html: /admin/*, /usuario/*, /superadmin/* -> front/paginas/...
    # Evita caer en index.html (login) y romper rutas relativas ./dist/ en el HTML equivocado.
    location ~ ^/(admin|usuario|superadmin)(/.*)?$ {
        try_files /paginas$uri.html /paginas$uri/index.html /paginas$uri $uri =404;
    }

    # /front/* debe servir los mismos assets que /
    location /front/ {
        rewrite ^/front/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html?$args;
    }

    location / {
        try_files $uri $uri/ /index.html?$args;
    }

    # API en local via PHP-FPM (sin locations anidados)
    location ^~ /api/ {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;

        if ($request_method = OPTIONS) { return 204; }

        include fastcgi_params;
        fastcgi_pass grobo_php83:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/core-backend-gem/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/core-backend-gem;
    }
}

