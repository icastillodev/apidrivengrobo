server {
    listen 80;
    server_name localhost;

    root /var/www/html/app;
    index index.html;

    location ~ ^/(dist|paginas|assets|resources|node_modules)(/|$) {
        try_files $uri $uri/ =404;
    }

    # /<slug> -> /front/<slug> (un solo segmento; no capturar admin, panel, etc.)
    location ~ ^/(?!front|dist|paginas|api|admin|usuario|panel|superadmin|URBE-API-DRIVEN)([a-zA-Z0-9_-]+)/?$ {
        return 302 $scheme://$http_host/front/$1;
    }

    location ^~ /URBE-API-DRIVEN/front/ {
        rewrite ^/URBE-API-DRIVEN/front/(.*)$ /front/$1 last;
    }
    location ^~ /URBE-API-DRIVEN/dist/ {
        rewrite ^/URBE-API-DRIVEN/dist/(.*)$ /dist/$1 last;
    }
    location ^~ /URBE-API-DRIVEN/api {
        rewrite ^/URBE-API-DRIVEN/api/?(.*)$ /api/$1 last;
    }

    # /front/panel|admin|usuario|superadmin — orden antes del slug de institución.
    # Regex con (/|$) para no confundir /front/panel con /front/panelicious
    location ~ ^/front/panel(/|$) {
        rewrite ^/front/panel/?$ /panel/dashboard last;
        rewrite ^/front/panel/(.*)$ /panel/$1 last;
    }
    location ~ ^/front/admin(/|$) {
        rewrite ^/front/admin/?$ /admin/dashboard last;
        rewrite ^/front/admin/(.*)$ /admin/$1 last;
    }
    location ~ ^/front/usuario(/|$) {
        rewrite ^/front/usuario/?$ /usuario/dashboard last;
        rewrite ^/front/usuario/(.*)$ /usuario/$1 last;
    }
    location ~ ^/front/superadmin(/|$) {
        rewrite ^/front/superadmin/?$ /superadmin/dashboard last;
        rewrite ^/front/superadmin/(.*)$ /superadmin/$1 last;
    }

    # /front/urbe -> login institución (no panel|admin|usuario|superadmin)
    location ~ ^/front/(?!admin|usuario|superadmin|panel)([a-zA-Z0-9_-]+)/?$ {
        rewrite ^/front/([a-zA-Z0-9_-]+)/?$ /index.html?inst=$1 last;
    }

    location ~ ^/(admin|usuario|superadmin|panel)(/.*)?$ {
        try_files /paginas$uri.html /paginas$uri/index.html /paginas$uri $uri =404;
    }

    # /front/dist, etc.: quitar prefijo; no usar index.html como fallback (evita login fantasma)
    location /front/ {
        rewrite ^/front/(.*)$ /$1 break;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ /index.html?$args;
    }

    location ^~ /api/ {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;

        if ($request_method = OPTIONS) { return 204; }

        include fastcgi_params;
        fastcgi_pass grobo_php83:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/core-backend-gem/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/core-backend-gem;
    }
}
