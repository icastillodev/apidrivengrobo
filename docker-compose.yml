version: '3.8'

services:
  webserver:
    image: nginx:alpine
    container_name: grobo_nginx
    ports:
      - "8080:80" # Asumiendo que usaste el 8080 por el error anterior
    volumes:
      - ./front:/var/www/html/app
      - ./api:/var/www/html/core-backend-gem
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm

  php-fpm:
    build: 
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: grobo_php83
    volumes:
      - ./api:/var/www/html/core-backend-gem
    expose:
      - "9000"

  db:
    image: mariadb:10.6
    container_name: grobo_db
    environment:
      MYSQL_ROOT_PASSWORD: root # Clave maestra de respaldo
      MYSQL_DATABASE: groboapp_geckos
      MYSQL_USER: geckosadmgrobo
      MYSQL_PASSWORD: nvSTZmUtqp.vWLS8
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

# NUEVO: Contenedor de phpMyAdmin con Auto-Login Root
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: grobo_pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root       # Auto-login usuario
      PMA_PASSWORD: root   # Auto-login contraseña (la definimos en MYSQL_ROOT_PASSWORD)
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data: