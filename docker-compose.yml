version: '3.8'

services:
  webserver:
    image: nginx:alpine
    container_name: grobo_nginx
    ports:
      - "8080:80"
    volumes:
      - ./front:/var/www/html/app
      - ./api:/var/www/html/core-backend-gem
      - ./.docker/nginx/default.local.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm

  php-fpm:
    build: 
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: grobo_php83
    env_file:
      # Permite que configures el SMTP real en local dentro de api/.env
      - ./api/.env
    environment:
      # SMTP (LOCAL) - se configura por .env (no versionado)
      # Ejemplo Hostinger:
      # MAIL_HOST=smtp.hostinger.com
      # MAIL_PORT=587
      # MAIL_USER=no-reply@tudominio.com
      # MAIL_PASS=tu_password
      # MAIL_SECURE=tls
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_SECURE: ${MAIL_SECURE:-none}
      MAIL_FROM: ${MAIL_FROM:-no-reply@groboapp.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-GROBO (local)}
    volumes:
      - ./api:/var/www/html/core-backend-gem
    expose:
      - "9000"

  db:
    image: mariadb:10.6
    container_name: grobo_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: groboapp_geckos
      MYSQL_USER: geckosadmgrobo
      MYSQL_PASSWORD: nvSTZmUtqp.vWLS8
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # ✅ CORREGIDO: Ahora phpmyadmin es "hijo" de services:
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: grobo_pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 512M
      MEMORY_LIMIT: 1024M
      MAX_EXECUTION_TIME: 3600
      UPLOADDIR: /var/www/html/upload
    ports:
      - "8081:80"
    depends_on:
      - db
    volumes:
      - ./dumps_sql:/var/www/html/upload

  mailhog:
    image: mailhog/mailhog
    container_name: grobo_mailhog
    ports:
      - "8025:8025" # UI
      - "1025:1025" # SMTP

volumes:
  db_data: