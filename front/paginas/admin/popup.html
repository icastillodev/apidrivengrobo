<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popups del panel — GROBO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css?v=20260409">
    <script type="module">
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js?v=20260420';
        import { Auth } from '../../dist/js/auth.js?v=20260409';
        import { initMenu } from '../../dist/js/components/MenuComponent.js?v=20260409';
        import { NotificationManager } from '../../dist/js/NotificationManager.js?v=20260409';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js?v=20260409';
        import { initDashboardPopupsAdmin } from '../../dist/js/pages/admin/comunicacion_dashboard_popups.js?v=20260509';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                if (window.txt) translatePage();
                Auth.checkAccess([2, 3, 4, 5, 6]);
                if (window.txt) {
                    await initMenu();
                    NotificationManager.init();
                    await initDashboardPopupsAdmin();
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light" style="font-family: Lato, sans-serif;" data-page-title-key="dashboard_popups_admin">
    <div class="container-fluid my-4 px-3">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3 border-bottom pb-2">
            <div>
                <h4 class="fw-black m-0" data-i18n="comunicacion.popup_admin_page_title"></h4>
                <p class="text-muted small mb-0 mt-1" data-i18n="comunicacion.popup_admin_page_sub"></p>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a href="./comunicacion/noticias.html" class="btn btn-outline-secondary btn-sm fw-bold">
                    <i class="bi bi-newspaper me-1"></i><span data-i18n="comunicacion.pp_btn_volver_noticias"></span>
                </a>
                <a href="./comunicacion/portada-popup.html" class="btn btn-outline-secondary btn-sm fw-bold">
                    <i class="bi bi-easel me-1"></i><span data-i18n="comunicacion.pp_btn_ir_portada"></span>
                </a>
                <button type="button" class="btn btn-success btn-sm fw-bold" id="btn-dp-nuevo">
                    <i class="bi bi-plus-lg me-1"></i><span data-i18n="comunicacion.popup_admin_btn_nuevo"></span>
                </button>
            </div>
        </div>

        <div class="table-responsive shadow-sm rounded bg-white border">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th data-i18n="comunicacion.popup_admin_col_nombre"></th>
                        <th data-i18n="comunicacion.pp_lbl_titulo"></th>
                        <th class="text-center" data-i18n="comunicacion.popup_admin_col_activo"></th>
                        <th data-i18n="comunicacion.popup_admin_col_actualizado"></th>
                        <th class="text-end" data-i18n="comunicacion.admin_col_acciones"></th>
                    </tr>
                </thead>
                <tbody id="dp-tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modal-dashboard-popup" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="dp-modal-title" data-i18n="comunicacion.popup_admin_modal_nuevo"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="dp-edit-id" value="">
                    <label class="form-label small fw-bold" data-i18n="comunicacion.popup_admin_lbl_nombre_interno"></label>
                    <input type="text" class="form-control mb-2" id="dp-nombre-interno" maxlength="255">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="dp-activo">
                        <label class="form-check-label fw-bold small" for="dp-activo" data-i18n="comunicacion.pp_popup_activo"></label>
                    </div>
                    <p class="small text-muted mb-3" data-i18n="comunicacion.popup_admin_only_one_active"></p>
                    <label class="form-label small fw-bold" data-i18n="comunicacion.pp_lbl_titulo"></label>
                    <input type="text" class="form-control mb-2" id="dp-titulo" maxlength="255">
                    <label class="form-label small fw-bold" data-i18n="comunicacion.pp_lbl_cuerpo"></label>
                    <textarea class="form-control mb-2" id="dp-cuerpo" rows="5"></textarea>
                    <p class="small text-muted mb-3" data-i18n="comunicacion.popup_admin_files_save_hint"></p>
                    <div class="border rounded p-3 mb-3 bg-light bg-opacity-50">
                        <p class="small fw-bold text-uppercase text-muted mb-2" data-i18n="comunicacion.popup_admin_popup_imagen_title"></p>
                        <input type="file" class="form-control form-control-sm mb-2" id="dp-file-portada" accept="image/jpeg,.jpg,.jpeg">
                        <div class="mb-2 d-none" id="dp-wrap-preview-portada">
                            <img id="dp-preview-portada" class="img-thumbnail" alt="" style="max-height:140px;object-fit:contain">
                        </div>
                        <p class="small text-muted mb-2" data-i18n="comunicacion.pp_b2_img_save_upload_hint"></p>
                        <div class="d-flex flex-wrap align-items-center gap-2">
                            <span class="small text-muted flex-grow-1" id="dp-status-portada"></span>
                            <button type="button" class="btn btn-sm btn-link p-0 d-none" id="dp-btn-prev-portada"><span data-i18n="comunicacion.pp_b2_btn_preview"></span></button>
                            <button type="button" class="btn btn-sm btn-link text-danger p-0 d-none" id="dp-btn-clear-portada"><span data-i18n="comunicacion.pp_b2_btn_clear"></span></button>
                        </div>
                    </div>
                    <div class="border rounded p-3 mb-3 bg-light bg-opacity-50">
                        <p class="small fw-bold text-uppercase text-muted mb-2" data-i18n="comunicacion.popup_admin_seccion_enlace"></p>
                        <p class="small text-muted mb-2" data-i18n="comunicacion.popup_admin_enlace_help"></p>
                        <label class="form-label small fw-bold mb-1" for="dp-noticia-select" data-i18n="comunicacion.popup_admin_lbl_elegir_noticia"></label>
                        <label class="form-label small text-muted mb-1 d-block" for="dp-noticia-filter" data-i18n="comunicacion.popup_admin_filtrar_noticias"></label>
                        <input type="search" class="form-control form-control-sm mb-2" id="dp-noticia-filter" autocomplete="off">
                        <select class="form-select form-select-sm" id="dp-noticia-select" size="8"></select>
                        <p class="small text-muted mt-2 mb-0" data-i18n="comunicacion.popup_admin_enlace_vs_adjuntos"></p>
                    </div>
                    <hr class="text-muted opacity-25" />
                    <p class="small fw-bold text-uppercase text-muted mb-2" data-i18n="comunicacion.pp_adjuntos_popup_title"></p>
                    <p class="small text-muted mb-3" data-i18n="comunicacion.pp_b2_help_mixed"></p>
                    <p class="small text-muted mb-3" data-i18n="comunicacion.popup_admin_adjuntos_doc_hint"></p>
                    <label class="form-label small" data-i18n="comunicacion.pp_lbl_url1"></label>
                    <input type="url" class="form-control mb-1" id="dp-url1" maxlength="768" placeholder="https://">
                    <label class="form-label small" data-i18n="comunicacion.pp_lbl_nombre1"></label>
                    <input type="text" class="form-control mb-2" id="dp-nombre1" maxlength="255">
                    <div class="border rounded p-2 mb-3 bg-light bg-opacity-50">
                        <p class="small fw-semibold mb-2 text-muted" data-i18n="comunicacion.pp_b2_doc_slot"></p>
                        <input type="file" class="form-control form-control-sm mb-2" id="dp-file-d1" accept=".pdf,.doc,.docx,.xls,.xlsx,application/pdf">
                        <div class="d-flex flex-wrap align-items-center gap-2">
                            <span class="small text-muted flex-grow-1" id="dp-status-d1"></span>
                            <button type="button" class="btn btn-sm btn-link p-0 d-none" id="dp-btn-prev-d1"><span data-i18n="comunicacion.pp_b2_btn_preview"></span></button>
                            <button type="button" class="btn btn-sm btn-link text-danger p-0 d-none" id="dp-btn-clear-d1"><span data-i18n="comunicacion.pp_b2_btn_clear"></span></button>
                        </div>
                    </div>
                    <label class="form-label small" data-i18n="comunicacion.pp_lbl_url2"></label>
                    <input type="url" class="form-control mb-1" id="dp-url2" maxlength="768" placeholder="https://">
                    <label class="form-label small" data-i18n="comunicacion.pp_lbl_nombre2"></label>
                    <input type="text" class="form-control mb-2" id="dp-nombre2" maxlength="255">
                    <div class="border rounded p-2 mb-0 bg-light bg-opacity-50">
                        <p class="small fw-semibold mb-2 text-muted" data-i18n="comunicacion.pp_b2_doc_slot"></p>
                        <input type="file" class="form-control form-control-sm mb-2" id="dp-file-d2" accept=".pdf,.doc,.docx,.xls,.xlsx,application/pdf">
                        <div class="d-flex flex-wrap align-items-center gap-2">
                            <span class="small text-muted flex-grow-1" id="dp-status-d2"></span>
                            <button type="button" class="btn btn-sm btn-link p-0 d-none" id="dp-btn-prev-d2"><span data-i18n="comunicacion.pp_b2_btn_preview"></span></button>
                            <button type="button" class="btn btn-sm btn-link text-danger p-0 d-none" id="dp-btn-clear-d2"><span data-i18n="comunicacion.pp_b2_btn_clear"></span></button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="comunicacion.admin_cancelar"></button>
                    <button type="button" class="btn btn-success fw-bold" id="btn-dp-guardar">
                        <i class="bi bi-save me-1"></i><span data-i18n="comunicacion.pp_btn_guardar"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
