<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubicación cajas — GROBO</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../dist/style/css/tailwind.css">

    <style>
        .table-ubic td { vertical-align: middle; font-size: 13px; }
    </style>

    <script type="module">
        import { Auth } from '../../../dist/js/auth.js';
        import { initMenu } from '../../../dist/js/components/MenuComponent.js';
        import { showLoader, hideLoader } from '../../../dist/js/components/LoaderComponent.js';
        import { NotificationManager } from '../../../dist/js/NotificationManager.js';
        import { loadLanguage, translatePage } from '../../../dist/js/utils/i18n.js';
        import { initConfigAlojamientoUbicacion } from '../../../dist/js/pages/admin/configuracion/config_alojamientos_ubicacion.js';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                Auth.checkAccess([1, 2]);
                const instName = localStorage.getItem('NombreInst') || 'Institución';
                const bread = document.getElementById('institucionbread');
                if (bread) bread.innerText = instName;
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    await initConfigAlojamientoUbicacion();
                    translatePage();
                } else {
                    throw new Error('window.txt no disponible');
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light" data-page-title-key="config_aloj_ubicacion">

    <div id="menu-container"></div>

    <div class="container-fluid py-4 px-4" style="max-width: 1200px;">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb small mb-0">
                <li class="breadcrumb-item text-muted" data-i18n="config_aloj_ubicacion.bread_grobo"></li>
                <li class="breadcrumb-item text-muted" data-i18n="config_aloj_ubicacion.bread_admin"></li>
                <li class="breadcrumb-item text-muted" data-i18n="config_aloj_ubicacion.bread_config"></li>
                <li class="breadcrumb-item active" data-i18n="config_aloj_ubicacion.bread_here"></li>
            </ol>
        </nav>

        <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-4">
            <div>
                <h4 class="fw-black text-dark m-0" data-i18n="config_aloj_ubicacion.titulo"></h4>
                <p class="text-muted small mb-0 mt-1" data-i18n="config_aloj_ubicacion.subtitulo"></p>
            </div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-sm btn-outline-secondary" id="btn-reload">
                    <i class="bi bi-arrow-clockwise"></i> <span data-i18n="config_aloj_ubicacion.btn_reload"></span>
                </button>
                <a href="config" class="btn btn-sm btn-outline-dark">
                    <i class="bi bi-arrow-left me-1"></i> <span data-i18n="config_aloj_ubicacion.btn_volver"></span>
                </a>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white py-2">
                <h6 class="fw-bold m-0 small text-uppercase" data-i18n="config_aloj_ubicacion.sec_labels"></h6>
            </div>
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-6 col-lg-4">
                        <label class="form-label small mb-0" data-i18n="config_aloj_ubicacion.lbl_lugar_fisico"></label>
                        <input type="text" class="form-control form-control-sm" id="inp-lbl-uf">
                    </div>
                    <div class="col-md-6 col-lg-4">
                        <label class="form-label small mb-0" data-i18n="config_aloj_ubicacion.lbl_salon"></label>
                        <input type="text" class="form-control form-control-sm" id="inp-lbl-salon">
                    </div>
                    <div class="col-md-6 col-lg-4">
                        <label class="form-label small mb-0" data-i18n="config_aloj_ubicacion.lbl_rack"></label>
                        <input type="text" class="form-control form-control-sm" id="inp-lbl-rack">
                    </div>
                    <div class="col-md-6 col-lg-4">
                        <label class="form-label small mb-0" data-i18n="config_aloj_ubicacion.lbl_lugar_rack"></label>
                        <input type="text" class="form-control form-control-sm" id="inp-lbl-lugar">
                    </div>
                    <div class="col-md-6 col-lg-4">
                        <label class="form-label small mb-0" data-i18n="config_aloj_ubicacion.lbl_comentario"></label>
                        <input type="text" class="form-control form-control-sm" id="inp-lbl-com">
                    </div>
                </div>
                <button type="button" class="btn btn-warning btn-sm fw-bold mt-3" id="btn-save-labels" data-i18n="config_aloj_ubicacion.btn_save_labels"></button>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white py-2 d-flex justify-content-between align-items-center">
                <h6 class="fw-bold m-0 small text-uppercase" data-i18n="config_aloj_ubicacion.tab_uf"></h6>
                <button type="button" class="btn btn-sm btn-primary" onclick="window.openNewUbic('uf')">
                    <i class="bi bi-plus-lg"></i> <span data-i18n="config_aloj_ubicacion.btn_add"></span>
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-sm table-hover mb-0 table-ubic">
                    <thead class="table-light">
                        <tr>
                            <th data-i18n="config_aloj_ubicacion.th_nombre"></th>
                            <th data-i18n="config_aloj_ubicacion.th_estado"></th>
                            <th class="text-end" data-i18n="config_aloj_ubicacion.th_accion"></th>
                        </tr>
                    </thead>
                    <tbody id="tbody-uf"></tbody>
                </table>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white py-2 d-flex justify-content-between align-items-center">
                <h6 class="fw-bold m-0 small text-uppercase" data-i18n="config_aloj_ubicacion.tab_salon"></h6>
                <button type="button" class="btn btn-sm btn-primary" onclick="window.openNewUbic('salon')">
                    <i class="bi bi-plus-lg"></i> <span data-i18n="config_aloj_ubicacion.btn_add"></span>
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-sm table-hover mb-0 table-ubic">
                    <thead class="table-light">
                        <tr>
                            <th data-i18n="config_aloj_ubicacion.th_nombre"></th>
                            <th data-i18n="config_aloj_ubicacion.th_parent_uf"></th>
                            <th data-i18n="config_aloj_ubicacion.th_estado"></th>
                            <th class="text-end" data-i18n="config_aloj_ubicacion.th_accion"></th>
                        </tr>
                    </thead>
                    <tbody id="tbody-salon"></tbody>
                </table>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white py-2 d-flex justify-content-between align-items-center">
                <h6 class="fw-bold m-0 small text-uppercase" data-i18n="config_aloj_ubicacion.tab_rack"></h6>
                <button type="button" class="btn btn-sm btn-primary" onclick="window.openNewUbic('rack')">
                    <i class="bi bi-plus-lg"></i> <span data-i18n="config_aloj_ubicacion.btn_add"></span>
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-sm table-hover mb-0 table-ubic">
                    <thead class="table-light">
                        <tr>
                            <th data-i18n="config_aloj_ubicacion.th_nombre"></th>
                            <th data-i18n="config_aloj_ubicacion.th_parent_salon"></th>
                            <th data-i18n="config_aloj_ubicacion.th_estado"></th>
                            <th class="text-end" data-i18n="config_aloj_ubicacion.th_accion"></th>
                        </tr>
                    </thead>
                    <tbody id="tbody-rack"></tbody>
                </table>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-5">
            <div class="card-header bg-white py-2 d-flex justify-content-between align-items-center">
                <h6 class="fw-bold m-0 small text-uppercase" data-i18n="config_aloj_ubicacion.tab_lugar"></h6>
                <button type="button" class="btn btn-sm btn-primary" onclick="window.openNewUbic('lugar')">
                    <i class="bi bi-plus-lg"></i> <span data-i18n="config_aloj_ubicacion.btn_add"></span>
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-sm table-hover mb-0 table-ubic">
                    <thead class="table-light">
                        <tr>
                            <th data-i18n="config_aloj_ubicacion.th_nombre"></th>
                            <th data-i18n="config_aloj_ubicacion.th_parent_rack"></th>
                            <th data-i18n="config_aloj_ubicacion.th_estado"></th>
                            <th class="text-end" data-i18n="config_aloj_ubicacion.th_accion"></th>
                        </tr>
                    </thead>
                    <tbody id="tbody-lugar"></tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
