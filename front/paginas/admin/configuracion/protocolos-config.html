<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración Protocolos - GROBO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../dist/style/css/tailwind.css">

    <script type="module">
        import { Auth } from '../../../dist/js/auth.js';
        import { API } from '../../../dist/js/api.js';
        import { initMenu } from '../../../dist/js/components/MenuComponent.js';
        import { showLoader, hideLoader } from '../../../dist/js/components/LoaderComponent.js';
        import { NotificationManager } from '../../../dist/js/NotificationManager.js';
        import { checkUrlParamsAndOpen } from '../../../dist/js/components/UrlRouter.js';
        import { loadLanguage, translatePage } from '../../../dist/js/utils/i18n.js';
        // Lógica específica para la configuración de flujos y tipos de protocolos
        import { initConfigProtocolos } from '../../../dist/js/pages/admin/configuracion/config_protocolos.js';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();

            try {
                // 1. CARGA CRÍTICA: Idioma
                // Bloqueamos la ejecución hasta que window.txt sea accesible globalmente
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null); 

                // 2. VALIDACIÓN DE ACCESO (Niveles 1, 2 - Administradores)
                Auth.checkAccess([1, 2]); 

                // 3. ACTUALIZACIÓN DE UI (Breadcrumbs dinámicos)
                const instName = localStorage.getItem('NombreInst') || 'Institución';
                const bread = document.getElementById('institucionbread');
                if (bread) bread.innerText = instName;

                // 4. INICIALIZACIÓN DE COMPONENTES
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    
                    // Inicialización de la lógica de flujos de protocolos
                    initConfigProtocolos();
                    translatePage();
                    
                    console.log("✅ Configuración de Protocolos inicializada correctamente.");
                } else {
                    throw new Error("El objeto de idioma window.txt no se generó.");
                }

                // 5. ROUTER (Delay de estabilidad para detectar parámetros en la URL)
                setTimeout(() => {
                    checkUrlParamsAndOpen();
                }, 300);

            } catch (error) {
                console.error("❌ Fallo en inicialización de ConfigProtocolos:", error);
            } finally {
                // Liberamos la interfaz inmediatamente después de la carga real del módulo
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light">
    
    <div class="container my-5 px-4">
        
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb text-uppercase fw-bold" style="font-size: 10px; letter-spacing: 1px;">
                <li class="breadcrumb-item text-muted" data-i18n="config_protocolos.bread_grobo"></li>
                <li class="breadcrumb-item text-muted" id="institucionbread">...</li>
                <li class="breadcrumb-item text-muted" data-i18n="config_protocolos.bread_admin"></li>
                <li class="breadcrumb-item active">
                    <span class="badge bg-danger px-2 py-1" data-i18n="config_protocolos.bread_protocolos"></span>
                </li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div>
                <h4 class="fw-black text-dark m-0" data-i18n="config_protocolos.titulo"></h4>
                <p class="text-muted small mb-0 mt-1" data-i18n="config_protocolos.subtitulo"></p>
            </div>
            <a href="config" class="btn btn-outline-secondary btn-sm fw-bold d-flex align-items-center px-3">
                <i class="bi bi-arrow-left me-2"></i> <span data-i18n="config_protocolos.btn_volver"></span>
            </a>
        </div>

        <ul class="nav nav-tabs nav-fill fw-bold mb-4 border-bottom-0" id="protoTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active border-0 shadow-sm rounded me-2" id="types-tab" data-bs-toggle="tab" data-bs-target="#types-pane">
                    <i class="bi bi-tags me-2"></i><span data-i18n="config_protocolos.tab_tipos"></span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link border-0 shadow-sm rounded bg-white text-muted" id="sev-tab" data-bs-toggle="tab" data-bs-target="#sev-pane">
                    <i class="bi bi-activity me-2"></i><span data-i18n="config_protocolos.tab_severidades"></span>
                </button>
            </li>
        </ul>

        <div class="tab-content">
            
            <div class="tab-pane fade show active" id="types-pane">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                        <h6 class="fw-bold text-muted mb-0" data-i18n="config_protocolos.categorias"></h6>
                        <button class="btn btn-danger btn-sm fw-bold shadow-sm" onclick="window.openModalType()">
                            <i class="bi bi-plus-lg me-1"></i> <span data-i18n="config_protocolos.btn_nuevo_tipo"></span>
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light small text-uppercase text-secondary">
                                <tr>
                                    <th class="ps-4" data-i18n="config_protocolos.th_nombre_categoria"></th>
                                    <th class="text-end pe-4" data-i18n="config_protocolos.th_acciones"></th>
                                </tr>
                            </thead>
                            <tbody id="table-types"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="sev-pane">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                        <h6 class="fw-bold text-muted mb-0" data-i18n="config_protocolos.niveles_severidad"></h6>
                        <button class="btn btn-warning btn-sm fw-bold shadow-sm text-dark" onclick="window.openModalSev()">
                            <i class="bi bi-plus-lg me-1"></i> <span data-i18n="config_protocolos.btn_nueva_severidad"></span>
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light small text-uppercase text-secondary">
                                <tr>
                                    <th class="ps-4" data-i18n="config_protocolos.th_nombre_nivel"></th>
                                    <th data-i18n="config_protocolos.th_detalle_desc"></th>
                                    <th class="text-end pe-4" data-i18n="config_protocolos.th_acciones"></th>
                                </tr>
                            </thead>
                            <tbody id="table-sev"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modal-type" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-danger text-white py-2">
                    <h6 class="modal-title fw-bold" data-i18n="config_protocolos.modal_tipo_titulo"></h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-type">
                        <input type="hidden" name="idtipoprotocolo" id="type-id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted" data-i18n="config_protocolos.label_nombre"></label>
                            <input type="text" name="Nombre" id="type-name" class="form-control fw-bold" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold shadow-sm" data-i18n="config_protocolos.btn_guardar"></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-sev" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-warning text-dark py-2">
                    <h6 class="modal-title fw-bold" data-i18n="config_protocolos.modal_sev_titulo"></h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-sev">
                        <input type="hidden" name="IdSeveridadTipo" id="sev-id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted" data-i18n="config_protocolos.label_nombre_nivel"></label>
                            <input type="text" name="Nombre" id="sev-name" class="form-control fw-bold" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted" data-i18n="config_protocolos.label_detalle"></label>
                            <textarea name="Detalle" id="sev-detail" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold shadow-sm" data-i18n="config_protocolos.btn_guardar"></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
