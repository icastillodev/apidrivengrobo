<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insumos Experimentales - GROBO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../dist/style/css/tailwind.css">

    <script type="module">
        import { Auth } from '../../../dist/js/auth.js';
        import { API } from '../../../dist/js/api.js';
        import { initMenu } from '../../../dist/js/components/MenuComponent.js';
        import { showLoader, hideLoader } from '../../../dist/js/components/LoaderComponent.js';
        import { NotificationManager } from '../../../dist/js/NotificationManager.js';
        import { checkUrlParamsAndOpen } from '../../../dist/js/components/UrlRouter.js';
        import { loadLanguage, translatePage } from '../../../dist/js/utils/i18n.js';
        // Lógica específica para la configuración de insumos experimentales
        import { initConfigInsumosExp } from '../../../dist/js/pages/admin/configuracion/config_insumos_exp.js';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();

            try {
                // 1. CARGA CRÍTICA: Idioma
                // Bloqueamos la ejecución hasta que window.txt esté listo para evitar el error de installHook
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null); 

                // 2. VALIDACIÓN DE ACCESO (Niveles 1, 2 - Administradores)
                Auth.checkAccess([1, 2]); 

                // 3. ACTUALIZACIÓN DE UI (Breadcrumbs dinámicos)
                const instName = localStorage.getItem('NombreInst') || 'Institución';
                const bread = document.getElementById('institucionbread');
                if (bread) bread.innerText = instName;

                // 4. INICIALIZACIÓN DE COMPONENTES
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    
                    // Inicialización de la lógica de catálogo de insumos
                    initConfigInsumosExp();
                    translatePage();
                    
                    console.log("✅ Configuración de Insumos Exp inicializada correctamente.");
                } else {
                    throw new Error("El objeto de idioma window.txt no se generó.");
                }

                // 5. ROUTER (Delay de estabilidad para abrir modales de edición de insumos desde la URL)
                setTimeout(() => {
                    checkUrlParamsAndOpen();
                }, 300);

            } catch (error) {
                console.error("❌ Fallo en inicialización de ConfigInsumosExp:", error);
            } finally {
                // Eliminamos la espera arbitraria de 500ms y liberamos la UI al terminar el flujo real
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light">
    
    <div class="container my-5 px-4">
        
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb text-uppercase fw-bold" style="font-size: 10px; letter-spacing: 1px;">
                <li class="breadcrumb-item text-muted" data-i18n="config_insumos_exp.bread_grobo"></li>
                <li class="breadcrumb-item text-muted" id="institucionbread">...</li>
                <li class="breadcrumb-item text-muted" data-i18n="config_insumos_exp.bread_admin"></li>
                <li class="breadcrumb-item active">
                    <span class="badge bg-primary px-2 py-1" data-i18n="config_insumos_exp.bread_insumos_exp"></span>
                </li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div>
                <h4 class="fw-black text-dark m-0" data-i18n="config_insumos_exp.titulo"></h4>
                <p class="text-muted small mb-0 mt-1" data-i18n="config_insumos_exp.subtitulo"></p>
            </div>
            <div class="d-flex gap-2">
                <a href="config" class="btn btn-outline-secondary btn-sm fw-bold d-flex align-items-center px-3">
                    <i class="bi bi-arrow-left me-2"></i> <span data-i18n="config_insumos_exp.btn_volver"></span>
                </a>
                <button class="btn btn-primary shadow-sm fw-bold" onclick="window.openModalInsumoExp()">
                    <i class="bi bi-flask me-2"></i> <span data-i18n="config_insumos_exp.btn_nuevo_reactivo"></span>
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-primary text-uppercase small">
                            <tr>
                                <th class="ps-4" data-i18n="config_insumos_exp.th_nombre"></th>
                                <th class="text-center" data-i18n="config_insumos_exp.th_presentacion"></th>
                                <th data-i18n="config_insumos_exp.th_especie_asociada"></th>
                                <th class="text-center" data-i18n="config_insumos_exp.th_estado"></th>
                                <th class="text-end pe-4" data-i18n="config_insumos_exp.th_acciones"></th>
                            </tr>
                        </thead>
                        <tbody id="table-insumos-exp"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <div class="modal fade" id="modal-insumo-exp" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white py-2">
                    <h6 class="modal-title fw-bold" data-i18n="config_insumos_exp.modal_titulo"></h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-insumo-exp">
                        <input type="hidden" name="IdInsumoexp" id="exp-id">
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted" data-i18n="config_insumos_exp.label_nombre"></label>
                            <input type="text" name="NombreInsumo" id="exp-nombre" class="form-control fw-bold" required>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-4">
                                <label class="form-label small fw-bold text-muted" data-i18n="config_insumos_exp.label_cantidad"></label>
                                <input type="number" name="CantidadInsumo" id="exp-cant" class="form-control" step="0.01" value="1" required>
                            </div>
                            <div class="col-8">
                                <label class="form-label small fw-bold text-muted" data-i18n="config_insumos_exp.label_tipo_unidad"></label>
                                <input type="text" name="TipoInsumo" id="exp-tipo" class="form-control" data-i18n="config_insumos_exp.ph_tipo" placeholder="Ej: ml, mg, Dosis" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted" data-i18n="config_insumos_exp.label_especie_opcional"></label>
                            <select name="IdespA" id="exp-especie" class="form-select">
                                <option value="0" data-i18n="config_insumos_exp.opcion_general"></option>
                            </select>
                            <div class="form-text small" data-i18n="config_insumos_exp.ayuda_especie"></div>
                        </div>

                        <div class="mb-3" id="exp-status-container"></div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm" data-i18n="config_insumos_exp.btn_guardar"></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
