<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departamentos - Configuración GROBO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../dist/style/css/tailwind.css">

    <style>
        .nav-link.active {
            background-color: #0dcaf0 !important; /* Info */
            color: white !important;
        }
    </style>

    <script type="module">
        import { Auth } from '../../../dist/js/auth.js';
        import { API } from '../../../dist/js/api.js';
        import { initMenu } from '../../../dist/js/components/MenuComponent.js';
        import { showLoader, hideLoader } from '../../../dist/js/components/LoaderComponent.js';
        import { NotificationManager } from '../../../dist/js/NotificationManager.js';
        import { checkUrlParamsAndOpen } from '../../../dist/js/components/UrlRouter.js';
        import { loadLanguage, translatePage } from '../../../dist/js/utils/i18n.js';
        // Lógica específica de configuración de departamentos/cátedras
        import { initConfigDeptos } from '../../../dist/js/pages/admin/configuracion/config_departamentos.js';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();

            try {
                // 1. CARGA CRÍTICA: Idioma
                // Bloqueamos la ejecución hasta que window.txt sea accesible globalmente
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null); 

                // 2. VALIDACIÓN DE ACCESO (Niveles 1, 2 - Roles Administrativos)
                Auth.checkAccess([1, 2]); 

                // 3. ACTUALIZACIÓN DE UI (Breadcrumbs)
                const instName = localStorage.getItem('NombreInst') || 'Institución';
                const bread = document.getElementById('institucionbread');
                if (bread) bread.innerText = instName;

                // 4. INICIALIZACIÓN DE COMPONENTES
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    
                    // Inicialización de la lógica de gestión de departamentos
                    initConfigDeptos();
                    translatePage();
                    
                    console.log("✅ Configuración de Departamentos inicializada correctamente.");
                } else {
                    throw new Error("El objeto de idioma window.txt no se generó.");
                }

                // 5. ROUTER (Delay de estabilidad para abrir edición de departamentos vía URL)
                setTimeout(() => {
                    checkUrlParamsAndOpen();
                }, 300);

            } catch (error) {
                console.error("❌ Fallo en inicialización de ConfigDeptos:", error);
            } finally {
                // Quitamos el loader al finalizar el flujo de carga real
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light">
    
    <div class="container my-5 px-4">
        
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb text-uppercase fw-bold" style="font-size: 10px; letter-spacing: 1px;">
                <li class="breadcrumb-item text-muted" data-i18n="config_departamentos.bread_grobo"></li>
                <li class="breadcrumb-item text-muted" id="institucionbread">...</li>
                <li class="breadcrumb-item text-muted" data-i18n="config_departamentos.bread_admin"></li>
                <li class="breadcrumb-item active">
                    <span class="badge bg-info text-white px-2 py-1" style="background-color: #0dcaf0 !important;" data-i18n="config_departamentos.bread_estructura"></span>
                </li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div>
                <h4 class="fw-black text-dark m-0" data-i18n="config_departamentos.titulo"></h4>
                <p class="text-muted small mb-0 mt-1" data-i18n="config_departamentos.subtitulo"></p>
            </div>
            
            <a href="config" class="btn btn-outline-secondary btn-sm fw-bold d-flex align-items-center px-3">
                <i class="bi bi-arrow-left me-2"></i> <span data-i18n="config_departamentos.btn_volver"></span>
            </a>
        </div>

        <ul class="nav nav-tabs nav-fill fw-bold mb-4 border-bottom-0" id="configTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active border-0 shadow-sm rounded me-2" id="deptos-tab" data-bs-toggle="tab" data-bs-target="#deptos-pane" type="button">
                    <i class="bi bi-diagram-3 me-2"></i><span data-i18n="config_departamentos.tab_departamentos"></span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link border-0 shadow-sm rounded bg-white text-muted" id="orgs-tab" data-bs-toggle="tab" data-bs-target="#orgs-pane" type="button">
                    <i class="bi bi-bank me-2"></i><span data-i18n="config_departamentos.tab_organismos"></span>
                </button>
            </li>
        </ul>

        <div class="tab-content">
            
            <div class="tab-pane fade show active" id="deptos-pane">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                        <h6 class="fw-bold text-muted mb-0" data-i18n="config_departamentos.listado_deptos"></h6>
                        <button class="btn btn-info text-white fw-bold btn-sm shadow-sm" onclick="window.openModalDepto()">
                            <i class="bi bi-plus-lg me-1"></i> <span data-i18n="config_departamentos.btn_nuevo_depto"></span>
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0" style="font-size: 13px;">
                                <thead class="bg-light text-secondary text-uppercase small">
                                    <tr>
                                        <th class="ps-4" data-i18n="config_departamentos.th_nombre_depto"></th>
                                        <th data-i18n="config_departamentos.th_detalle"></th>
                                        <th data-i18n="config_departamentos.th_organismo_padre"></th>
                                        <th class="text-end pe-4" data-i18n="config_departamentos.th_acciones"></th>
                                    </tr>
                                </thead>
                                <tbody id="table-deptos"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="orgs-pane">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                        <h6 class="fw-bold text-muted mb-0" data-i18n="config_departamentos.entidades_organismos"></h6>
                        <button class="btn btn-secondary fw-bold btn-sm shadow-sm" onclick="window.openModalOrg()">
                            <i class="bi bi-plus-lg me-1"></i> <span data-i18n="config_departamentos.btn_nuevo_organismo"></span>
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0" style="font-size: 13px;">
                                <thead class="bg-light text-secondary text-uppercase small">
                                    <tr>
                                        <th class="ps-4" data-i18n="config_departamentos.th_nombre_corto"></th>
                                        <th data-i18n="config_departamentos.th_nombre_completo"></th>
                                        <th data-i18n="config_departamentos.th_contacto"></th>
                                        <th data-i18n="config_departamentos.th_pais"></th>
                                        <th class="text-end pe-4" data-i18n="config_departamentos.th_acciones"></th>
                                    </tr>
                                </thead>
                                <tbody id="table-orgs"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modal-depto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title fw-bold fs-6" data-i18n="config_departamentos.modal_depto_titulo"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-depto">
                        <input type="hidden" name="iddeptoA" id="depto-id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted" data-i18n="config_departamentos.label_nombre_depto"></label>
                            <input type="text" name="NombreDepto" id="depto-nombre" class="form-control fw-bold" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted" data-i18n="config_departamentos.label_organismo_opcional"></label>
                            <select name="idOrg" id="depto-org" class="form-select" >
                                
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted" data-i18n="config_departamentos.label_detalle_ubicacion"></label>
                            <textarea name="Detalle" id="depto-detalle" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-info text-white fw-bold shadow-sm" data-i18n="config_departamentos.btn_guardar"></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-org" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-secondary text-white">
                    <h5 class="modal-title fw-bold fs-6" data-i18n="config_departamentos.modal_org_titulo"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-org">
                        <input type="hidden" name="IdOrganismo" id="org-id">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted" data-i18n="config_departamentos.label_nombre_corto"></label>
                                <input type="text" name="NombreSimple" id="org-simple" class="form-control fw-bold" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted" data-i18n="config_departamentos.label_pais"></label>
                                <input type="text" name="Pais" id="org-pais" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold text-muted" data-i18n="config_departamentos.label_nombre_completo"></label>
                                <input type="text" name="NombreCompleto" id="org-completo" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted" data-i18n="config_departamentos.label_contacto"></label>
                                <input type="text" name="Contacto" id="org-contacto" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted" data-i18n="config_departamentos.label_correo"></label>
                                <input type="email" name="Correo" id="org-correo" class="form-control">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold text-muted" data-i18n="config_departamentos.label_direccion"></label>
                                <input type="text" name="Direccion" id="org-dir" class="form-control">
                            </div>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-secondary fw-bold shadow-sm" data-i18n="config_departamentos.btn_guardar"></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
