<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas y Espacios - GROBO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../dist/style/css/tailwind.css">

    <style>
        /* Estilo Pink/Danger para Reservas */
        .text-theme { color: #d63384; }
        .bg-theme { background-color: #d63384; color: white; }
        .btn-theme { background-color: #d63384; border-color: #d63384; color: white; }
        .btn-theme:hover { background-color: #a61e61; border-color: #a61e61; color: white; }
        
        .nav-tabs .nav-link.active {
            color: #d63384;
            font-weight: 800;
            border-bottom: 3px solid #d63384;
        }
        .table-schedule input[type="time"] { font-size: 12px; padding: 2px 5px; }
    </style>

    <script type="module">
        import { Auth } from '../../../dist/js/auth.js';
        import { API } from '../../../dist/js/api.js';
        import { initMenu } from '../../../dist/js/components/MenuComponent.js';
        import { showLoader, hideLoader } from '../../../dist/js/components/LoaderComponent.js';
        import { NotificationManager } from '../../../dist/js/NotificationManager.js';
        import { checkUrlParamsAndOpen } from '../../../dist/js/components/UrlRouter.js';
        import { loadLanguage, translatePage } from '../../../dist/js/utils/i18n.js';
        // Lógica específica para la configuración del sistema de reservas y calendarios
        import { initConfigReservas } from '../../../dist/js/pages/admin/configuracion/config_reservas.js';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();

            try {
                // 1. CARGA CRÍTICA: Idioma
                // Bloqueamos la ejecución hasta que window.txt esté listo para i18n
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null); 

                // 2. VALIDACIÓN DE ACCESO (Niveles 1, 2 - Administradores)
                Auth.checkAccess([1, 2]); 

                // 3. ACTUALIZACIÓN DE UI (Breadcrumbs dinámicos)
                const instName = localStorage.getItem('NombreInst') || 'Institución';
                const bread = document.getElementById('institucionbread');
                if (bread) bread.innerText = instName;

                // 4. INICIALIZACIÓN DE COMPONENTES
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    
                    // Inicialización de la lógica de gestión de reservas
                    initConfigReservas();
                    translatePage();
                    
                    console.log("✅ Configuración de Reservas inicializada correctamente.");
                } else {
                    throw new Error("El objeto de idioma window.txt no se generó.");
                }

                // 5. ROUTER (Delay de estabilidad para detectar parámetros en la URL)
                setTimeout(() => {
                    checkUrlParamsAndOpen();
                }, 300);

            } catch (error) {
                console.error("❌ Fallo en inicialización de ConfigReservas:", error);
            } finally {
                // Liberamos la interfaz inmediatamente después de la carga real del módulo
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light">
    <div class="container my-5 px-4">
        
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb text-uppercase fw-bold" style="font-size: 10px; letter-spacing: 1px;">
                <li class="breadcrumb-item text-muted" data-i18n="config_reservas.bread_grobo"></li>
                <li class="breadcrumb-item text-muted" id="institucionbread">...</li>
                <li class="breadcrumb-item text-muted" data-i18n="config_reservas.bread_admin"></li>
                <li class="breadcrumb-item active">
                    <span class="badge bg-danger bg-opacity-75 px-2 py-1" data-i18n="config_reservas.bread_reservas"></span>
                </li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div>
                <h4 class="fw-black text-dark m-0" data-i18n="config_reservas.titulo"></h4>
                <p class="text-muted small mb-0 mt-1" data-i18n="config_reservas.subtitulo"></p>
            </div>
            <a href="config" class="btn btn-outline-secondary btn-sm fw-bold d-flex align-items-center px-3">
                <i class="bi bi-arrow-left me-2"></i> <span data-i18n="config_reservas.btn_volver"></span>
            </a>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <div class="fw-black text-dark" data-i18n="config_reservas.aprobacion_titulo"></div>
                        <div class="text-muted small" data-i18n="config_reservas.aprobacion_sub"></div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="small fw-bold text-muted" data-i18n="config_reservas.aprobacion_auto"></span>
                        <div class="form-check form-switch m-0">
                            <input class="form-check-input" type="checkbox" id="res-req-aprob">
                        </div>
                        <span class="small fw-bold text-muted" data-i18n="config_reservas.aprobacion_req"></span>
                        <button class="btn btn-theme btn-sm fw-bold ms-2" id="btn-save-aprob" type="button" data-i18n="config_reservas.btn_guardar_aprob"></button>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4" id="reservaTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="salas-tab" data-bs-toggle="tab" data-bs-target="#salas-pane" type="button">
                    <i class="bi bi-door-open me-2"></i><span data-i18n="config_reservas.tab_salas"></span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="inst-tab" data-bs-toggle="tab" data-bs-target="#inst-pane" type="button">
                    <i class="bi bi-motherboard me-2"></i><span data-i18n="config_reservas.tab_instrumentos"></span>
                </button>
            </li>
        </ul>

        <div class="tab-content">
            
            <div class="tab-pane fade show active" id="salas-pane">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-3">
                            <button class="btn btn-theme fw-bold shadow-sm btn-sm" onclick="window.openModalSala()">
                                <i class="bi bi-plus-lg me-1"></i> <span data-i18n="config_reservas.btn_nueva_sala"></span>
                            </button>
                            <div class="dropdown">
                                <button class="btn btn-outline-dark btn-sm fw-bold dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                    <i class="bi bi-gear-fill me-1"></i> <span data-i18n="config_reservas.config_global_horarios"></span>
                                </button>
                                <ul class="dropdown-menu shadow">
                                    <li><h6 class="dropdown-header small" data-i18n="config_reservas.aplicar_todas"></h6></li>
                                    <li><a class="dropdown-item small" href="#" onclick="window.updateGlobalTimeType(1)" data-i18n="config_reservas.reserva_hora"></a></li>
                                    <li><a class="dropdown-item small" href="#" onclick="window.updateGlobalTimeType(2)" data-i18n="config_reservas.reserva_media"></a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0 text-sm">
                                <thead class="table-light text-uppercase small">
                                    <tr>
                                        <th class="ps-4" data-i18n="config_reservas.th_sala_lab"></th>
                                        <th data-i18n="config_reservas.th_ubicacion"></th>
                                        <th class="text-center" data-i18n="config_reservas.th_tipo_reserva"></th>
                                        <th class="text-center" data-i18n="config_reservas.th_estado"></th>
                                        <th class="text-end pe-4" data-i18n="config_reservas.th_acciones"></th>
                                    </tr>
                                </thead>
                                <tbody id="table-salas"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="inst-pane">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3">
                        <button class="btn btn-secondary fw-bold shadow-sm btn-sm" onclick="window.openModalInst()">
                            <i class="bi bi-plus-lg me-1"></i> <span data-i18n="config_reservas.btn_nuevo_instrumento"></span>
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0 text-sm">
                                <thead class="table-light text-uppercase small">
                                    <tr>
                                        <th class="ps-4" data-i18n="config_reservas.th_instrumento"></th>
                                        <th data-i18n="config_reservas.th_cantidad_stock"></th>
                                        <th data-i18n="config_reservas.th_detalle"></th>
                                        <th class="text-center" data-i18n="config_reservas.th_estado"></th>
                                        <th class="text-end pe-4" data-i18n="config_reservas.th_acciones"></th>
                                    </tr>
                                </thead>
                                <tbody id="table-inst"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modal-sala" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-theme text-white">
                    <h5 class="modal-title fw-bold fs-6" data-i18n="config_reservas.modal_sala_titulo"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-sala">
                        <input type="hidden" name="IdSalaReserva" id="sala-id">
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" data-i18n="config_reservas.label_nombre_sala"></label>
                                <input type="text" name="Nombre" id="sala-nombre" class="form-control fw-bold" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" data-i18n="config_reservas.label_ubicacion"></label>
                                <input type="text" name="Lugar" id="sala-lugar" class="form-control" data-i18n="config_reservas.ph_ubicacion" placeholder="Ej: Planta Baja, Block B">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" data-i18n="config_reservas.label_tipo_bloque"></label>
                                <select name="tipohorasalas" id="sala-tipo" class="form-select">
                                    <option value="1" data-i18n="config_reservas.opcion_hora"></option>
                                    <option value="2" data-i18n="config_reservas.opcion_media"></option>
                                    <option value="3" data-i18n="config_reservas.opcion_otro"></option>
                                </select>
                            </div>
                            <div class="col-md-6 d-none" id="sala-status-container">
                                <label class="form-label small fw-bold" data-i18n="config_reservas.label_estado"></label>
                                <select name="habilitado" id="sala-habilitado" class="form-select fw-bold">
                                    <option value="1" data-i18n="config_reservas.opcion_habilitada"></option>
                                    <option value="0" data-i18n="config_reservas.opcion_fuera_servicio"></option>
                                </select>
                            </div>
                        </div>

                        <hr class="text-muted opacity-25">
                        
                        <h6 class="fw-bold small text-muted mb-3"><i class="bi bi-clock me-2"></i><span data-i18n="config_reservas.disponibilidad_semanal"></span></h6>
                        <div class="table-responsive bg-light border rounded p-2">
                            <table class="table table-sm table-borderless mb-0 table-schedule">
                                <thead>
                                    <tr class="text-muted small">
                                        <th style="width: 120px;" data-i18n="config_reservas.th_dia"></th>
                                        <th data-i18n="config_reservas.th_hora_inicio"></th>
                                        <th data-i18n="config_reservas.th_hora_fin"></th>
                                        <th class="text-center" style="width: 50px;" data-i18n="config_reservas.th_activo"></th>
                                    </tr>
                                </thead>
                                <tbody id="schedule-body">
                                    </tbody>
                            </table>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-theme fw-bold shadow-sm" data-i18n="config_reservas.btn_guardar_config"></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-inst" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-secondary text-white">
                    <h5 class="modal-title fw-bold fs-6" data-i18n="config_reservas.modal_inst_titulo"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-inst">
                        <input type="hidden" name="IdReservaInstrumento" id="inst-id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold" data-i18n="config_reservas.label_nombre_inst"></label>
                            <input type="text" name="NombreInstrumento" id="inst-nombre" class="form-control fw-bold" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold" data-i18n="config_reservas.label_cantidad_disp"></label>
                            <input type="number" name="cantidad" id="inst-cant" class="form-control" value="1" min="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold" data-i18n="config_reservas.label_detalle"></label>
                            <textarea name="detalleInstrumento" id="inst-detalle" class="form-control" rows="2"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold" data-i18n="config_reservas.label_inst_scope"></label>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="inst-scope-global" checked>
                                <label class="form-check-label fw-bold" for="inst-scope-global" data-i18n="config_reservas.inst_scope_global"></label>
                            </div>

                            <div id="inst-scope-salas-wrap" class="mt-2 d-none">
                                <div class="small text-muted mb-2" data-i18n="config_reservas.inst_scope_help"></div>
                                <div id="inst-scope-salas" class="border rounded p-2 bg-light" style="max-height: 220px; overflow:auto;"></div>
                                <div id="inst-scope-salas-empty" class="small text-muted d-none" data-i18n="config_reservas.inst_scope_empty"></div>
                            </div>
                        </div>
                        
                        <div class="mb-3 d-none" id="inst-status-container">
                            <label class="form-label small fw-bold" data-i18n="config_reservas.label_estado"></label>
                            <select name="habilitado" id="inst-habilitado" class="form-select">
                                <option value="1" data-i18n="config_reservas.opcion_habilitado"></option>
                                <option value="0" data-i18n="config_reservas.opcion_deshabilitado"></option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-secondary fw-bold shadow-sm" data-i18n="config_reservas.btn_guardar"></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
