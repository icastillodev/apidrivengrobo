<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROBO - Panel de Administración</title>
    
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/style/css/styles.css">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">

    <style>
        body { font-family: 'Lato', sans-serif; background-color: #f4f7f6; }
        .breadcrumb-item + .breadcrumb-item::before { content: "/"; color: #dee2e6; }
        .table-hover tbody tr:hover { background-color: #f2f2f2 !important; cursor: pointer; }
        .badge-status { font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
        
        /* Ajuste para que los botones del chart no se rompan en pantallas chicas */
        .chart-header-actions .btn { padding: 0.25rem 0.5rem; font-size: 0.875rem; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>




    <script type="module">
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js';
        import { Auth } from '../../dist/js/auth.js';
        import { API } from '../../dist/js/api.js';
        import { initMenu } from '../../dist/js/components/MenuComponent.js?v=20260311';
        import { NotificationManager } from '../../dist/js/NotificationManager.js';
        import { checkUrlParamsAndOpen } from '../../dist/js/components/UrlRouter.js';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js';
        // Lógica de estadísticas (Charts, reportes y métricas globales)
        import { initStatsPage } from '../../dist/js/pages/admin/GeckoStats.js?v=20260311';

        showLoader();
        document.addEventListener('DOMContentLoaded', async () => {
            

            try {
                // 1. CARGA CRÍTICA: Idioma
                // Detiene la ejecución hasta que el diccionario esté disponible para los gráficos
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null); 

                // 2. VALIDACIÓN DE ACCESO (Niveles 1, 2, 4 - Roles Administrativos y Superadmin)
                Auth.checkAccess([1, 2, 4,5,6]); 

                // 3. INICIALIZACIÓN DE COMPONENTES
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    
                    // Inicialización de la lógica de estadísticas avanzada
                    initStatsPage();
                    translatePage();
                    
                    console.log("✅ Panel de Estadísticas inicializado correctamente.");
                } else {
                    throw new Error("El objeto de idioma window.txt no se generó.");
                }

                // 4. ROUTER (Delay para permitir la renderización de contenedores de gráficos)
                setTimeout(() => {
                    checkUrlParamsAndOpen();
                }, 300);

            } catch (error) {
                console.error("❌ Fallo en inicialización de página de Estadísticas:", error);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>

<body class="hold-transition sidebar-mini gecko-loaded">

        <div id="sidebar-placeholder"></div>

        <div class="content-wrapper">

                    <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-4">
