<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Facturación - Bioterio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../dist/style/css/tailwind.css">
    
<style>
        body { font-family: 'Lato', sans-serif; background-color: #f4f7f6; }
        .breadcrumb-item + .breadcrumb-item::before { content: "/"; color: #dee2e6; }
        
        .card-billing-option { transition: all 0.3s ease; border: none; cursor: pointer; overflow: hidden; }
        .card-billing-option:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important; }
        
        /* Círculos perfectos */
        .icon-circle { 
            width: 70px; height: 70px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2rem; margin: 0 auto 20px; transition: all 0.3s ease; 
        }
        .icon-circle i { display: flex; line-height: 0; } /* FIX: Evita que el icono se caiga */
        .card-billing-option:hover .icon-circle { transform: scale(1.1); }
        
        /* Colores exactos (Fondo pastel, Icono fuerte) */
        .ic-depto { background-color: #e8f5e9; color: #198754; }
        .ic-persona { background-color: #cfe2ff; color: #0d6efd; }
        .ic-proto { background-color: #e2e3e5; color: #212529; }

        .btn-select { font-size: 10px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
    </style>

    <script type="module">
        import { Auth } from '../../../dist/js/auth.js';
        import { initMenu } from '../../../dist/js/components/MenuComponent.js?v=20260311';
        import { showLoader, hideLoader } from '../../../dist/js/components/LoaderComponent.js';
        import { NotificationManager } from '../../../dist/js/NotificationManager.js';
        import { checkUrlParamsAndOpen } from '../../../dist/js/components/UrlRouter.js';
        import { loadLanguage, translatePage } from '../../../dist/js/utils/i18n.js';

        // 🚀 FIX: Exponemos la función al objeto global window para que el HTML pueda usarla
        window.irFacturacion = function(modulo) {
            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const base = isLocal ? '/URBE-API-DRIVEN/front/admin/facturacion/' : '/admin/facturacion/';
            window.location.href = base + modulo;
        };
        
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null); 
                translatePage();

                Auth.checkAccess([1, 2, 4, 5, 6]); 

                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                }

                setTimeout(() => { checkUrlParamsAndOpen(); }, 300);
            } catch (error) {
                console.error("❌ Fallo en inicialización de página:", error);
            } finally {
                hideLoader();
            }
        });

    </script>
</head>
<body>
    <div class="container-fluid my-5 px-4 px-md-5">
        <div class="card shadow-sm border-0 p-4">
            
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb text-uppercase fw-bold" style="font-size: 10px; letter-spacing: 1px;">
                    <li class="breadcrumb-item text-muted">GROBO</li>
                    <li class="breadcrumb-item text-muted" data-i18n="facturacion.bread_admin">Admin</li>
                    <li class="breadcrumb-item active">
                        <span class="badge bg-success px-2 py-1" style="background-color: #1a5d3b !important;" data-i18n="facturacion.titulo">Facturación</span>
                    </li>
                </ol>
            </nav>

            <div class="text-center mb-5">
                <h4 class="fw-bold m-0 uppercase" style="letter-spacing: -0.5px;" data-i18n="facturacion.centro_liquidacion"></h4>
                <p class="text-muted small" data-i18n="facturacion.subtitulo"></p>
            </div>

            <div class="row g-4 justify-content-center mb-4">
                
                <div class="col-md-3">
                    <div class="card h-100 shadow-sm card-billing-option p-4 text-center border-top border-5 border-success" onclick="irFacturacion('depto')">
                        <div class="icon-circle ic-depto shadow-sm">
                            <i class="bi bi-building-gear"></i>
                        </div>
                        <h6 class="fw-bold uppercase mb-2" data-i18n="facturacion.por_depto">Por Departamento</h6>
                        <p class="text-muted" style="font-size: 12px; line-height: 1.4;" data-i18n="facturacion.desc_depto"></p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card h-100 shadow-sm card-billing-option p-4 text-center border-top border-5 border-info" onclick="irFacturacion('org')">
                        <div class="icon-circle shadow-sm" style="background-color: #e0f7fa; color: #0891b2;">
                            <i class="bi bi-diagram-3"></i>
                        </div>
                        <h6 class="fw-bold uppercase mb-2" data-i18n="facturacion.por_organizacion">Por Organización</h6>
                        <p class="text-muted" style="font-size: 12px; line-height: 1.4;" data-i18n="facturacion.desc_organizacion"></p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card h-100 shadow-sm card-billing-option p-4 text-center border-top border-5 border-primary" onclick="irFacturacion('investigador')">
                        <div class="icon-circle ic-persona shadow-sm">
                            <i class="bi bi-person-vcard"></i>
                        </div>
                        <h6 class="fw-bold uppercase mb-2" data-i18n="facturacion.por_investigador">Por Persona</h6>
                        <p class="text-muted" style="font-size: 12px; line-height: 1.4;" data-i18n="facturacion.desc_investigador"></p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card h-100 shadow-sm card-billing-option p-4 text-center border-top border-5 border-dark" onclick="irFacturacion('protocolo')">
                        <div class="icon-circle ic-proto shadow-sm">
                            <i class="bi bi-file-earmark-medical"></i>
                        </div>
                        <h6 class="fw-bold uppercase mb-2" data-i18n="facturacion.por_protocolo">Por Protocolo</h6>
                        <p class="text-muted" style="font-size: 12px; line-height: 1.4;" data-i18n="facturacion.desc_protocolo"></p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
