<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturación por Institución - Bioterio</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Lato', sans-serif; background-color: #f4f7f6; }
        .breadcrumb-item + .breadcrumb-item::before { content: "/"; color: #dee2e6; }
        .card-inst { border-left: 5px solid #6f42c1; }
        .stat-card { transition: all 0.3s ease; border-top: 5px solid #6f42c1; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; }
        .table-billing { font-size: 11px; }
        .table-billing tbody tr { transition: all 0.2s; }
        .table-billing tbody tr:hover td { background-color: #f3e8ff !important; }
        .pointer { cursor: pointer !important; }
    </style>

    <script type="module">
        import { showLoader, hideLoader } from '../../../dist/js/components/LoaderComponent.js';
        import { Auth } from '../../../dist/js/auth.js';
        import { initMenu } from '../../../dist/js/components/MenuComponent.js';
        import { NotificationManager } from '../../../dist/js/NotificationManager.js';
        import { checkUrlParamsAndOpen } from '../../../dist/js/components/UrlRouter.js';
        import { loadLanguage, translatePage } from '../../../dist/js/utils/i18n.js';
        import { initBillingInstitucion } from '../../../dist/js/pages/admin/facturacion/billingInstitucion.js';

        showLoader();
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                translatePage();
                Auth.checkAccess([1, 2, 4, 5, 6]);
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    initBillingInstitucion();
                }
                setTimeout(() => { checkUrlParamsAndOpen(); }, 300);
            } catch (error) {
                console.error('Fallo init BillingInstitucion:', error);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body>
    <div class="container-fluid my-5 px-4 px-md-5">
        <div class="card shadow-sm border-0 p-4">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb text-uppercase fw-bold" style="font-size: 10px; letter-spacing: 1px;">
                    <li class="breadcrumb-item text-muted">GROBO</li>
                    <li class="breadcrumb-item text-muted" data-i18n="facturacion.bread_admin">Admin</li>
                    <li class="breadcrumb-item text-muted" data-i18n="facturacion.titulo">Facturación</li>
                    <li class="breadcrumb-item active">
                        <span class="badge px-2 py-1" style="background-color: #6f42c1 !important;" data-i18n="facturacion.por_institucion">Por Institución</span>
                    </li>
                </ol>
            </nav>

            <div class="mb-3">
                <a href="index" class="btn btn-sm btn-light border fw-bold text-secondary shadow-sm px-3" style="font-size: 11px;">
                    <i class="bi bi-arrow-left-circle-fill me-1"></i> <span data-i18n="facturacion.volver_seleccion"></span>
                </a>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0">
                    <i class="bi bi-buildings-fill me-2" style="color: #6f42c1;"></i>
                    <span data-i18n="facturacion.titulo_liquidacion_institucion">Facturación por Institución</span>
                </h5>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-danger btn-sm px-3 fw-bold shadow-sm" onclick="window.downloadInstGlobalPDF()">
                        <i class="bi bi-file-earmark-pdf me-1"></i> <span data-i18n="facturacion.pdf_global"></span>
                    </button>
                    <button class="btn btn-outline-success btn-sm px-3 fw-bold shadow-sm" onclick="window.exportExcelInstGlobal()">
                        <i class="bi bi-file-earmark-excel me-1"></i> <span data-i18n="facturacion.excel_global"></span>
                    </button>
                </div>
            </div>

            <div class="row align-items-end mb-4 pb-3 border-bottom g-2">
                <div class="col-md-4">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-light text-muted fw-bold small uppercase" style="font-size: 10px;" data-i18n="facturacion.inst_solicitante">Institución:</span>
                        <select id="sel-inst-solicitante" class="form-select form-select-sm fw-bold shadow-none" style="border-color: #6f42c1;"></select>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-light text-muted fw-bold small uppercase" style="font-size: 10px;" data-i18n="generales.desde">Desde:</span>
                        <input type="date" id="f-desde-inst" class="form-control form-control-sm shadow-none">
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-light text-muted fw-bold small uppercase" style="font-size: 10px;" data-i18n="generales.hasta">Hasta:</span>
                        <input type="date" id="f-hasta-inst" class="form-control form-control-sm shadow-none">
                    </div>
                </div>
                <div class="col-md-1">
                    <button class="btn btn-primary btn-sm w-100 fw-bold shadow-sm" id="btn-cargar-inst" style="background-color: #6f42c1; border-color: #6f42c1;">
                        <i class="bi bi-search me-1"></i>
                    </button>
                </div>
            </div>

            <div id="dashboard-area-inst" class="mb-5 d-none">
                <div class="text-center mb-4">
                    <h5 id="titulo-institucion-dinamico" class="fw-bold m-0 mb-1 text-uppercase" style="color: #6f42c1; letter-spacing: 1px;"></h5>
                    <h6 class="text-muted fw-bold uppercase" style="font-size: 11px; letter-spacing: 2px;">
                        <span data-i18n="facturacion.resumen_fin">Resumen Financiero</span> - <span id="txt-periodo-inst"></span>
                    </h6>
                </div>
                <div id="stats-container-inst" class="row g-3 mb-4 justify-content-center"></div>
            </div>

            <div id="billing-results-inst" class="mt-2"></div>
        </div>
    </div>
    <div id="modal-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
