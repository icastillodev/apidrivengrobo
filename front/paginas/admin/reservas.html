<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - GROBO</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">

    <style>
        .adm-day-cell { width: 14.2857%; min-height: 72px; cursor: pointer; border: 1px solid rgba(0,0,0,.05); }
        .adm-day-cell.disabled { cursor: not-allowed; opacity: .4; background: #fafafa; }
        .adm-day-cell.available { background: rgba(25,135,84,.07); }
        .adm-day-cell.selected { outline: 2px solid #198754; outline-offset: -2px; background: rgba(25,135,84,.12); }
        .adm-slot-btn { font-size: 12px; }
    </style>

    <script type="module">
        import { Auth } from '../../dist/js/auth.js';
        import { initMenu } from '../../dist/js/components/MenuComponent.js';
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js';
        import { NotificationManager } from '../../dist/js/NotificationManager.js';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js';
        import { initAdminReservas } from '../../dist/js/pages/admin/reservas.js?v=20260403';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                Auth.checkAccess([1, 2, 4, 5, 6]);
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    initAdminReservas();
                    translatePage();
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body class="bg-light" style="font-family: Lato, sans-serif;">
    <div class="container my-5 px-4">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div>
                <h4 class="fw-black text-dark m-0" data-i18n="admin_reservas.titulo"></h4>
                <p class="text-muted small mb-0 mt-1" data-i18n="admin_reservas.subtitulo"></p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-dark btn-sm fw-bold" id="btn-pdf-dia">
                    <i class="bi bi-file-earmark-pdf me-1"></i><span data-i18n="admin_reservas.btn_pdf_dia"></span>
                </button>
                <button class="btn btn-outline-dark btn-sm fw-bold" id="btn-pdf_rango">
                    <i class="bi bi-file-earmark-pdf me-1"></i><span data-i18n="admin_reservas.btn_pdf_rango"></span>
                </button>
                <button class="btn btn-outline-dark btn-sm fw-bold" id="btn-pdf-cal-mes">
                    <i class="bi bi-calendar3 me-1"></i><span data-i18n="admin_reservas.btn_pdf_cal_mes"></span>
                </button>
                <button class="btn btn-dark btn-sm fw-bold" type="button" id="btn-imprimir-qr" data-i18n="admin_reservas.btn_imprimir_qr">
                    IMPRIMIR QR
                </button>
                <button class="btn btn-outline-secondary btn-sm fw-bold" id="btn-refresh">
                    <i class="bi bi-arrow-repeat me-1"></i><span data-i18n="admin_reservas.btn_actualizar"></span>
                </button>
                <button class="btn btn-primary btn-sm fw-bold" id="btn-nueva-reserva">
                    <i class="bi bi-plus-lg me-1"></i><span data-i18n="admin_reservas.btn_nueva"></span>
                </button>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label small fw-bold" data-i18n="admin_reservas.label_sala"></label>
                        <div class="d-flex gap-2 align-items-stretch">
                            <select class="form-select fw-bold flex-grow-1" id="select-sala"></select>
                            <button class="btn btn-outline-dark btn-sm fw-bold d-none text-nowrap" type="button" id="btn-qr-sala-rapido" title="">
                                <i class="bi bi-qr-code"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold" data-i18n="admin_reservas.label_dia_pdf"></label>
                        <input type="date" class="form-control" id="pdf-day">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold" data-i18n="admin_reservas.label_desde"></label>
                        <input type="date" class="form-control" id="range-from">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold" data-i18n="admin_reservas.label_hasta"></label>
                        <input type="date" class="form-control" id="range-to">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button class="btn btn-success fw-bold" id="btn-buscar" data-i18n="admin_reservas.btn_buscar"></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 text-sm">
                        <thead class="table-light text-uppercase small">
                            <tr>
                                <th class="ps-4" data-i18n="admin_reservas.th_fecha"></th>
                                <th data-i18n="admin_reservas.th_horario"></th>
                                <th data-i18n="admin_reservas.th_sala"></th>
                                <th data-i18n="admin_reservas.th_titular"></th>
                                <th data-i18n="admin_reservas.th_estado"></th>
                                <th class="text-end pe-4" data-i18n="admin_reservas.th_acciones"></th>
                            </tr>
                        </thead>
                        <tbody id="table-agenda"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-black text-dark" data-i18n="admin_reservas.pendientes_titulo"></div>
                    <div class="text-muted small" data-i18n="admin_reservas.pendientes_sub"></div>
                </div>
                <button class="btn btn-outline-warning btn-sm fw-bold" id="btn-refresh-pend">
                    <i class="bi bi-arrow-repeat me-1"></i><span data-i18n="admin_reservas.btn_actualizar"></span>
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 text-sm">
                        <thead class="table-light text-uppercase small">
                            <tr>
                                <th class="ps-4" data-i18n="admin_reservas.th_fecha"></th>
                                <th data-i18n="admin_reservas.th_horario"></th>
                                <th data-i18n="admin_reservas.th_sala"></th>
                                <th data-i18n="admin_reservas.th_titular"></th>
                                <th class="text-end pe-4" data-i18n="admin_reservas.th_acciones"></th>
                            </tr>
                        </thead>
                        <tbody id="table-pendientes"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-qr-print" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-dark text-white py-2">
                    <h5 class="modal-title fw-bold fs-6" data-i18n="admin_reservas.modal_qr_titulo"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="small text-muted mb-2" data-i18n="admin_reservas.modal_qr_desc"></p>
                    <label class="form-label small fw-bold" data-i18n="admin_reservas.modal_qr_elige"></label>
                    <select class="form-select mb-3" id="qr-print-tipo"></select>
                    <div class="row g-2">
                        <div class="col-12">
                            <label class="form-label small fw-bold" data-i18n="admin_reservas.modal_qr_pdf_titulo"></label>
                            <input type="text" class="form-control form-control-sm" id="qr-pdf-titulo">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold" data-i18n="admin_reservas.modal_qr_pdf_sub"></label>
                            <input type="text" class="form-control form-control-sm" id="qr-pdf-sub">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm fw-bold" data-bs-dismiss="modal" data-i18n="admin_reservas.modal_qr_cancel"></button>
                    <button type="button" class="btn btn-primary btn-sm fw-bold" id="btn-qr-print-ejecutar" data-i18n="admin_reservas.modal_qr_generar"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="qr-print-buffer" style="display:none;"></div>

    <div class="modal fade" id="modal-reserva" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold fs-6" data-i18n="admin_reservas.modal_titulo"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-reserva">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_titular"></label>
                                <select class="form-select" id="res-titular" required></select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_fecha"></label>
                                <input type="date" class="form-control" id="res-fecha" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_sala"></label>
                                <select class="form-select" id="res-sala" required></select>
                            </div>
                            <div class="col-12">
                                <div class="border rounded p-3 bg-light">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <div class="fw-bold small text-muted" data-i18n="admin_reservas.cal_slot_picker"></div>
                                        <div class="d-flex align-items-center gap-2">
                                            <button class="btn btn-sm btn-light fw-bold" type="button" id="adm-cal-prev">
                                                <i class="bi bi-chevron-left"></i> <span data-i18n="admin_reservas.btn_anterior"></span>
                                            </button>
                                            <div class="fw-black text-uppercase small" id="adm-cal-title">—</div>
                                            <button class="btn btn-sm btn-light fw-bold" type="button" id="adm-cal-next">
                                                <span data-i18n="admin_reservas.btn_siguiente"></span> <i class="bi bi-chevron-right"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div class="d-flex text-muted small fw-bold">
                                        <div class="text-center" style="width:14.2857%" data-i18n="admin_reservas.dow_lu"></div>
                                        <div class="text-center" style="width:14.2857%" data-i18n="admin_reservas.dow_ma"></div>
                                        <div class="text-center" style="width:14.2857%" data-i18n="admin_reservas.dow_mi"></div>
                                        <div class="text-center" style="width:14.2857%" data-i18n="admin_reservas.dow_ju"></div>
                                        <div class="text-center" style="width:14.2857%" data-i18n="admin_reservas.dow_vi"></div>
                                        <div class="text-center" style="width:14.2857%" data-i18n="admin_reservas.dow_sa"></div>
                                        <div class="text-center" style="width:14.2857%" data-i18n="admin_reservas.dow_do"></div>
                                    </div>
                                    <div id="adm-cal-grid" class="d-flex flex-wrap mt-1"></div>
                                    <div class="small text-muted mt-2" data-i18n="admin_reservas.hint_calendario"></div>

                                    <div class="mt-3">
                                        <div class="fw-bold small text-muted mb-2" data-i18n="admin_reservas.label_horarios"></div>
                                        <div id="adm-slots-list" class="d-flex flex-wrap gap-2"></div>
                                        <div id="adm-slots-empty" class="small text-muted d-none" data-i18n="admin_reservas.msg_sin_horarios"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_inicio"></label>
                                <input type="time" class="form-control" id="res-hora-ini" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_fin"></label>
                                <input type="time" class="form-control" id="res-hora-fin" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_instrumentos"></label>
                                <div id="inst-admin-list" class="border rounded p-2 bg-light" style="max-height: 220px; overflow:auto;"></div>
                                <div class="small text-muted mt-1" data-i18n="admin_reservas.hint_instrumentos"></div>
                            </div>
                        </div>

                        <hr class="my-3">

                        <div class="alert alert-info py-2 small mb-3" id="admin-slot-hint">
                            <i class="bi bi-info-circle me-1"></i>
                            <span data-i18n="admin_reservas.hint_disponibilidad"></span>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_modo"></label>
                                <select class="form-select" id="res-modo">
                                    <option value="single" data-i18n="admin_reservas.modo_single"></option>
                                    <option value="serie" data-i18n="admin_reservas.modo_serie"></option>
                                </select>
                            </div>

                            <div class="col-md-4 d-none" id="serie-tipo-wrap">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_serie_tipo"></label>
                                <select class="form-select" id="serie-tipo">
                                    <option value="1" data-i18n="admin_reservas.serie_semanal"></option>
                                    <option value="2" data-i18n="admin_reservas.serie_fechas"></option>
                                </select>
                            </div>

                            <div class="col-md-4 d-none" id="serie-cada-wrap">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_cada_n"></label>
                                <input type="number" class="form-control" id="serie-cada-n" value="1" min="1">
                            </div>

                            <div class="col-md-6 d-none" id="serie-rango-wrap">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_rango"></label>
                                <div class="d-flex gap-2">
                                    <input type="date" class="form-control" id="serie-desde">
                                    <input type="date" class="form-control" id="serie-hasta">
                                </div>
                            </div>

                            <div class="col-md-6 d-none" id="serie-dias-wrap">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_dias_semana"></label>
                                <div class="d-flex flex-wrap gap-2">
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="1" id="dw1"><label class="form-check-label" for="dw1" data-i18n="admin_reservas.dow_lu"></label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="2" id="dw2"><label class="form-check-label" for="dw2" data-i18n="admin_reservas.dow_ma"></label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="3" id="dw3"><label class="form-check-label" for="dw3" data-i18n="admin_reservas.dow_mi"></label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="4" id="dw4"><label class="form-check-label" for="dw4" data-i18n="admin_reservas.dow_ju"></label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="5" id="dw5"><label class="form-check-label" for="dw5" data-i18n="admin_reservas.dow_vi"></label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="6" id="dw6"><label class="form-check-label" for="dw6" data-i18n="admin_reservas.dow_sa"></label></div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="7" id="dw7"><label class="form-check-label" for="dw7" data-i18n="admin_reservas.dow_do"></label></div>
                                </div>
                            </div>

                            <div class="col-12 d-none" id="serie-fechas-wrap">
                                <label class="form-label small fw-bold" data-i18n="admin_reservas.label_fechas_especificas"></label>
                                <textarea class="form-control" id="serie-fechas" rows="2" placeholder="YYYY-MM-DD, YYYY-MM-DD"></textarea>
                                <div class="small text-muted mt-1" data-i18n="admin_reservas.hint_fechas"></div>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary fw-bold" data-i18n="admin_reservas.btn_guardar"></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
