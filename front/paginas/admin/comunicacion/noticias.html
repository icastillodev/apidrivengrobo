<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias (admin) - GROBO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../dist/style/css/tailwind.css">
    <script type="module">
        import { showLoader, hideLoader } from '../../../dist/js/components/LoaderComponent.js';
        import { Auth } from '../../../dist/js/auth.js';
        import { initMenu } from '../../../dist/js/components/MenuComponent.js?v=20260311';
        import { NotificationManager } from '../../../dist/js/NotificationManager.js';
        import { loadLanguage, translatePage } from '../../../dist/js/utils/i18n.js';
        import { initAdminNoticias } from '../../../dist/js/pages/admin/comunicacion_noticias.js?v=20260408';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                if (window.txt) translatePage();
                Auth.checkAccess([2, 3, 4, 5, 6]);
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    initAdminNoticias();
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light" style="font-family: Lato, sans-serif;" data-page-title-key="noticias_admin">
    <div class="container-fluid my-4 px-3">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3 border-bottom pb-2">
            <div>
                <h4 class="fw-black m-0" data-i18n="comunicacion.admin_titulo"></h4>
            </div>
            <button type="button" class="btn btn-success btn-sm fw-bold" id="btn-nueva-noticia">
                <i class="bi bi-plus-lg me-1"></i><span data-i18n="comunicacion.admin_nueva"></span>
            </button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 small">
                    <thead class="table-light">
                        <tr>
                            <th data-i18n="comunicacion.col_fecha"></th>
                            <th data-i18n="comunicacion.admin_titulo_campo"></th>
                            <th class="text-center" data-i18n="comunicacion.admin_col_en_red"></th>
                            <th class="text-center" data-i18n="comunicacion.admin_col_estado"></th>
                            <th class="text-end" data-i18n="comunicacion.admin_col_acciones"></th>
                        </tr>
                    </thead>
                    <tbody id="admin-noticias-tbody"></tbody>
                </table>
            </div>
            <div class="card-footer d-flex flex-wrap justify-content-between align-items-center gap-2 bg-white border-0">
                <span class="text-muted small" id="admin-noticias-pag-info"></span>
                <div class="btn-group btn-group-sm">
                    <button type="button" class="btn btn-outline-secondary" id="admin-noticias-prev" data-i18n="comunicacion.portal_pag_prev"></button>
                    <button type="button" class="btn btn-outline-secondary" id="admin-noticias-next" data-i18n="comunicacion.portal_pag_next"></button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-noticia-admin" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-admin-titulo"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-id" value="">
                    <label class="form-label small fw-bold" data-i18n="comunicacion.admin_titulo_campo"></label>
                    <input type="text" class="form-control mb-2" id="edit-titulo" maxlength="500">
                    <label class="form-label small fw-bold" data-i18n="comunicacion.admin_categoria"></label>
                    <input type="text" class="form-control mb-2" id="edit-categoria" maxlength="80" data-i18n="comunicacion.admin_categoria_ph">
                    <label class="form-label small fw-bold" data-i18n="comunicacion.admin_categoria_color"></label>
                    <select class="form-select mb-2" id="edit-categoria-badge">
                        <option value="primary" data-i18n="comunicacion.badge_variant_primary"></option>
                        <option value="secondary" data-i18n="comunicacion.badge_variant_secondary"></option>
                        <option value="success" data-i18n="comunicacion.badge_variant_success"></option>
                        <option value="danger" data-i18n="comunicacion.badge_variant_danger"></option>
                        <option value="warning" data-i18n="comunicacion.badge_variant_warning"></option>
                        <option value="info" data-i18n="comunicacion.badge_variant_info"></option>
                        <option value="dark" data-i18n="comunicacion.badge_variant_dark"></option>
                    </select>
                    <p class="small text-muted mb-2" data-i18n="comunicacion.admin_publicar_solo_local"></p>
                    <p class="small text-warning mb-2 d-none" id="edit-legacy-red-hint" data-i18n="comunicacion.admin_legacy_red_hint"></p>
                    <label class="form-label small fw-bold" data-i18n="comunicacion.admin_estado_publicacion"></label>
                    <select class="form-select mb-2" id="edit-estado">
                        <option value="borrador" data-i18n="comunicacion.admin_estado_borrador"></option>
                        <option value="publicada" data-i18n="comunicacion.admin_estado_publicada_label"></option>
                        <option value="programada" data-i18n="comunicacion.admin_estado_programada_label">Programada</option>
                    </select>
                    <div id="wrap-fecha-compartir" class="d-none">
                        <div id="wrap-fecha-programada" class="d-none">
                            <label class="form-label small fw-bold" data-i18n="comunicacion.admin_fecha_publicacion"></label>
                            <input type="datetime-local" class="form-control mb-1" id="edit-fecha-pub" step="60">
                            <p class="small text-muted mb-2" data-i18n="comunicacion.admin_fecha_publicacion_help"></p>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="edit-compartir-red" checked>
                            <label class="form-check-label" for="edit-compartir-red" data-i18n="comunicacion.admin_compartir_red"></label>
                        </div>
                        <p class="small text-muted mb-3" data-i18n="comunicacion.admin_compartir_red_help"></p>
                    </div>
                    <label class="form-label small fw-bold" data-i18n="comunicacion.admin_cuerpo"></label>
                    <textarea class="form-control" id="edit-cuerpo" rows="8"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal" data-i18n="comunicacion.modal_cerrar"></button>
                    <button type="button" class="btn btn-success btn-sm fw-bold" id="btn-guardar-noticia" data-i18n="comunicacion.admin_guardar"></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
