<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portada y popup — GROBO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../dist/style/css/tailwind.css?v=20260409">
    <script type="module">
        import { showLoader, hideLoader } from '../../../dist/js/components/LoaderComponent.js?v=20260420';
        import { Auth } from '../../../dist/js/auth.js?v=20260409';
        import { initMenu } from '../../../dist/js/components/MenuComponent.js?v=20260409';
        import { NotificationManager } from '../../../dist/js/NotificationManager.js?v=20260409';
        import { loadLanguage, translatePage } from '../../../dist/js/utils/i18n.js?v=20260409';
        import { initAdminPortadaPopup } from '../../../dist/js/pages/admin/comunicacion_portada_popup.js?v=20260509b';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                if (window.txt) translatePage();
                Auth.checkAccess([2, 3, 4, 5, 6]);
                if (window.txt) {
                    await initMenu();
                    NotificationManager.init();
                    await initAdminPortadaPopup();
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light" style="font-family: Lato, sans-serif;" data-page-title-key="portada_popup_admin">
    <div class="container-fluid my-4 px-3">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3 border-bottom pb-2">
            <div>
                <h4 class="fw-black m-0" data-i18n="comunicacion.pp_page_title"></h4>
                <p class="text-muted small mb-0 mt-1" data-i18n="comunicacion.pp_page_sub"></p>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a href="./noticias.html" class="btn btn-outline-secondary btn-sm fw-bold">
                    <i class="bi bi-newspaper me-1"></i><span data-i18n="comunicacion.pp_btn_volver_noticias"></span>
                </a>
                <button type="button" class="btn btn-success btn-sm fw-bold" id="btn-pp-guardar">
                    <i class="bi bi-save me-1"></i><span data-i18n="comunicacion.pp_btn_guardar"></span>
                </button>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-12 col-lg-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-bottom py-3">
                        <h5 class="fw-bold mb-0 text-success" data-i18n="comunicacion.pp_seccion_portada"></h5>
                        <p class="small text-muted mb-0 mt-2" data-i18n="comunicacion.pp_portada_help"></p>
                    </div>
                    <div class="card-body">
                        <label class="form-label small fw-bold" data-i18n="comunicacion.pp_lbl_titulo"></label>
                        <input type="text" class="form-control mb-2" id="pp-portada-titulo" maxlength="255">
                        <label class="form-label small fw-bold" data-i18n="comunicacion.pp_lbl_cuerpo"></label>
                        <textarea class="form-control mb-3" id="pp-portada-cuerpo" rows="6"></textarea>
                        <div class="border rounded p-3 mb-3 bg-white">
                            <p class="small fw-semibold mb-2 text-muted" data-i18n="comunicacion.pp_b2_img_title"></p>
                            <input type="file" class="form-control form-control-sm mb-2" id="pp-file-portada-img" accept="image/jpeg,.jpg,.jpeg">
                            <div class="d-flex flex-wrap align-items-center gap-2">
                                <button type="button" class="btn btn-sm btn-outline-secondary" id="pp-btn-upload-portada-img"><span data-i18n="comunicacion.pp_b2_btn_upload"></span></button>
                                <span class="small text-muted flex-grow-1" id="pp-status-portada-img"></span>
                                <button type="button" class="btn btn-sm btn-link p-0 d-none" id="pp-btn-prev-portada-img" data-preview-path="/comunicacion/portada-popup/archivo/portada_imagen"><span data-i18n="comunicacion.pp_b2_btn_preview"></span></button>
                                <button type="button" class="btn btn-sm btn-link text-danger p-0 d-none" id="pp-btn-clear-portada-img"><span data-i18n="comunicacion.pp_b2_btn_clear"></span></button>
                            </div>
                        </div>
                        <hr class="text-muted opacity-25" />
                        <p class="small fw-bold text-uppercase text-muted mb-2" data-i18n="comunicacion.pp_adjuntos_title"></p>
                        <p class="small text-muted mb-3" data-i18n="comunicacion.pp_b2_help_mixed"></p>
                        <label class="form-label small" data-i18n="comunicacion.pp_lbl_url1"></label>
                        <input type="url" class="form-control mb-1" id="pp-portada-url1" maxlength="768" placeholder="https://">
                        <label class="form-label small" data-i18n="comunicacion.pp_lbl_nombre1"></label>
                        <input type="text" class="form-control mb-2" id="pp-portada-nombre1" maxlength="255">
                        <div class="border rounded p-2 mb-3 bg-light bg-opacity-50">
                            <p class="small fw-semibold mb-2 text-muted" data-i18n="comunicacion.pp_b2_doc_slot"></p>
                            <input type="file" class="form-control form-control-sm mb-2" id="pp-file-portada-d1" accept=".pdf,.doc,.docx,.xls,.xlsx,application/pdf">
                            <div class="d-flex flex-wrap align-items-center gap-2">
                                <button type="button" class="btn btn-sm btn-outline-secondary" id="pp-btn-upload-portada-d1"><span data-i18n="comunicacion.pp_b2_btn_upload"></span></button>
                                <span class="small text-muted flex-grow-1" id="pp-status-portada-d1"></span>
                                <button type="button" class="btn btn-sm btn-link p-0 d-none" id="pp-btn-prev-portada-d1" data-preview-path="/comunicacion/portada-popup/archivo/portada_doc1"><span data-i18n="comunicacion.pp_b2_btn_preview"></span></button>
                                <button type="button" class="btn btn-sm btn-link text-danger p-0 d-none" id="pp-btn-clear-portada-d1"><span data-i18n="comunicacion.pp_b2_btn_clear"></span></button>
                            </div>
                        </div>
                        <label class="form-label small" data-i18n="comunicacion.pp_lbl_url2"></label>
                        <input type="url" class="form-control mb-1" id="pp-portada-url2" maxlength="768" placeholder="https://">
                        <label class="form-label small" data-i18n="comunicacion.pp_lbl_nombre2"></label>
                        <input type="text" class="form-control mb-2" id="pp-portada-nombre2" maxlength="255">
                        <div class="border rounded p-2 mb-0 bg-light bg-opacity-50">
                            <p class="small fw-semibold mb-2 text-muted" data-i18n="comunicacion.pp_b2_doc_slot"></p>
                            <input type="file" class="form-control form-control-sm mb-2" id="pp-file-portada-d2" accept=".pdf,.doc,.docx,.xls,.xlsx,application/pdf">
                            <div class="d-flex flex-wrap align-items-center gap-2">
                                <button type="button" class="btn btn-sm btn-outline-secondary" id="pp-btn-upload-portada-d2"><span data-i18n="comunicacion.pp_b2_btn_upload"></span></button>
                                <span class="small text-muted flex-grow-1" id="pp-status-portada-d2"></span>
                                <button type="button" class="btn btn-sm btn-link p-0 d-none" id="pp-btn-prev-portada-d2" data-preview-path="/comunicacion/portada-popup/archivo/portada_doc2"><span data-i18n="comunicacion.pp_b2_btn_preview"></span></button>
                                <button type="button" class="btn btn-sm btn-link text-danger p-0 d-none" id="pp-btn-clear-portada-d2"><span data-i18n="comunicacion.pp_b2_btn_clear"></span></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-bottom py-3">
                        <h5 class="fw-bold mb-0 text-primary" data-i18n="comunicacion.pp_seccion_popup"></h5>
                        <p class="small text-muted mb-0 mt-2" data-i18n="comunicacion.pp_popup_help"></p>
                    </div>
                    <div class="card-body">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="pp-popup-activo">
                            <label class="form-check-label fw-bold small" for="pp-popup-activo" data-i18n="comunicacion.pp_popup_activo"></label>
                        </div>
                        <label class="form-label small fw-bold" data-i18n="comunicacion.pp_lbl_titulo"></label>
                        <input type="text" class="form-control mb-2" id="pp-popup-titulo" maxlength="255">
                        <label class="form-label small fw-bold" data-i18n="comunicacion.pp_lbl_cuerpo"></label>
                        <textarea class="form-control mb-3" id="pp-popup-cuerpo" rows="5"></textarea>
                        <label class="form-label small fw-bold" data-i18n="comunicacion.pp_lbl_id_noticia"></label>
                        <input type="number" min="1" class="form-control mb-1" id="pp-popup-id-noticia" placeholder="">
                        <p class="small text-muted mb-3" data-i18n="comunicacion.pp_id_noticia_help"></p>
                        <hr class="text-muted opacity-25" />
                        <p class="small fw-bold text-uppercase text-muted mb-2" data-i18n="comunicacion.pp_adjuntos_popup_title"></p>
                        <p class="small text-muted mb-3" data-i18n="comunicacion.pp_b2_help_mixed"></p>
                        <label class="form-label small" data-i18n="comunicacion.pp_lbl_url1"></label>
                        <input type="url" class="form-control mb-1" id="pp-popup-url1" maxlength="768" placeholder="https://">
                        <label class="form-label small" data-i18n="comunicacion.pp_lbl_nombre1"></label>
                        <input type="text" class="form-control mb-2" id="pp-popup-nombre1" maxlength="255">
                        <div class="border rounded p-2 mb-3 bg-light bg-opacity-50">
                            <p class="small fw-semibold mb-2 text-muted" data-i18n="comunicacion.pp_b2_doc_slot"></p>
                            <input type="file" class="form-control form-control-sm mb-2" id="pp-file-popup-d1" accept=".pdf,.doc,.docx,.xls,.xlsx,application/pdf">
                            <div class="d-flex flex-wrap align-items-center gap-2">
                                <button type="button" class="btn btn-sm btn-outline-secondary" id="pp-btn-upload-popup-d1"><span data-i18n="comunicacion.pp_b2_btn_upload"></span></button>
                                <span class="small text-muted flex-grow-1" id="pp-status-popup-d1"></span>
                                <button type="button" class="btn btn-sm btn-link p-0 d-none" id="pp-btn-prev-popup-d1" data-preview-path="/comunicacion/portada-popup/archivo/popup_doc1"><span data-i18n="comunicacion.pp_b2_btn_preview"></span></button>
                                <button type="button" class="btn btn-sm btn-link text-danger p-0 d-none" id="pp-btn-clear-popup-d1"><span data-i18n="comunicacion.pp_b2_btn_clear"></span></button>
                            </div>
                        </div>
                        <label class="form-label small" data-i18n="comunicacion.pp_lbl_url2"></label>
                        <input type="url" class="form-control mb-1" id="pp-popup-url2" maxlength="768" placeholder="https://">
                        <label class="form-label small" data-i18n="comunicacion.pp_lbl_nombre2"></label>
                        <input type="text" class="form-control mb-2" id="pp-popup-nombre2" maxlength="255">
                        <div class="border rounded p-2 mb-0 bg-light bg-opacity-50">
                            <p class="small fw-semibold mb-2 text-muted" data-i18n="comunicacion.pp_b2_doc_slot"></p>
                            <input type="file" class="form-control form-control-sm mb-2" id="pp-file-popup-d2" accept=".pdf,.doc,.docx,.xls,.xlsx,application/pdf">
                            <div class="d-flex flex-wrap align-items-center gap-2">
                                <button type="button" class="btn btn-sm btn-outline-secondary" id="pp-btn-upload-popup-d2"><span data-i18n="comunicacion.pp_b2_btn_upload"></span></button>
                                <span class="small text-muted flex-grow-1" id="pp-status-popup-d2"></span>
                                <button type="button" class="btn btn-sm btn-link p-0 d-none" id="pp-btn-prev-popup-d2" data-preview-path="/comunicacion/portada-popup/archivo/popup_doc2"><span data-i18n="comunicacion.pp_b2_btn_preview"></span></button>
                                <button type="button" class="btn btn-sm btn-link text-danger p-0 d-none" id="pp-btn-clear-popup-d2"><span data-i18n="comunicacion.pp_b2_btn_clear"></span></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
