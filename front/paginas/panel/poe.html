<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POE - GROBO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css?v=20260409">
    <style>
        .poe-portal-card {
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.2s ease, transform 0.15s ease;
            min-height: 220px;
        }
        .poe-portal-card:hover {
            box-shadow: 0 0.5rem 1.25rem rgba(25, 135, 84, 0.12) !important;
            transform: translateY(-2px);
        }
    </style>
    <script type="module">
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js?v=20260420';
        import { Auth } from '../../dist/js/auth.js?v=20260409';
        import { initMenu } from '../../dist/js/components/MenuComponent.js?v=20260521';
        import { NotificationManager } from '../../dist/js/NotificationManager.js?v=20260409';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js?v=20260409';
        import { initPortalPoe } from '../../dist/js/pages/panel/poe_portal.js?v=20260613';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                if (window.txt) translatePage();
                Auth.checkAccess([1, 2, 3, 4, 5, 6]);
                if (window.txt) {
                    await initMenu();
                    NotificationManager.init();
                    await initPortalPoe();
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light" style="font-family: Lato, sans-serif;" data-page-title-key="poe_portal">
    <div class="container my-4 px-3">
        <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-3 border-bottom pb-2">
            <div>
                <h4 class="fw-black m-0" data-i18n="comunicacion.poe_portal_titulo"></h4>
                <small class="text-muted d-block" data-i18n="comunicacion.poe_portal_sub"></small>
            </div>
            <a href="./noticias.html" class="btn btn-outline-secondary btn-sm fw-bold flex-shrink-0">
                <i class="bi bi-newspaper me-1"></i><span data-i18n="comunicacion.poe_btn_volver_noticias"></span>
            </a>
        </div>

        <div id="poe-portal-grid" class="row row-cols-1 row-cols-md-2 g-4"></div>
    </div>

    <div class="modal fade" id="modal-poe-portal-detalle" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <div class="w-100">
                        <p class="small text-muted mb-1" id="poe-detalle-meta"></p>
                        <h5 class="modal-title fw-black" id="poe-detalle-titulo"></h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-2">
                    <p class="small text-muted mb-3" id="poe-detalle-resena"></p>
                    <p class="small fw-bold text-uppercase text-muted mb-2" data-i18n="comunicacion.pp_lbl_cuerpo"></p>
                    <div id="poe-detalle-cuerpo" class="mb-4"></div>
                    <div id="poe-detalle-adjuntos" class="mb-2"></div>
                </div>
                <div class="modal-footer flex-wrap gap-2">
                    <button type="button" class="btn btn-outline-secondary btn-sm fw-bold" id="btn-poe-detalle-qr">
                        <i class="bi bi-qr-code me-1"></i><span data-i18n="comunicacion.poe_btn_qr"></span>
                    </button>
                    <button type="button" class="btn btn-success btn-sm fw-bold" id="btn-poe-detalle-print-qr">
                        <i class="bi bi-printer me-1"></i><span data-i18n="comunicacion.poe_btn_imprimir_qr"></span>
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm fw-bold" data-bs-dismiss="modal" data-i18n="comunicacion.admin_cancelar"></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
