<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POE - GROBO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css?v=20260409">
    <style>
        .poe-card { border-radius: 12px; transition: box-shadow 0.2s ease, transform 0.15s ease; }
        .poe-card:hover { box-shadow: 0 0.5rem 1.25rem rgba(25, 135, 84, 0.12) !important; transform: translateY(-2px); }
    </style>
    <script type="module">
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js?v=20260420';
        import { Auth } from '../../dist/js/auth.js?v=20260409';
        import { initMenu } from '../../dist/js/components/MenuComponent.js?v=20260409';
        import { NotificationManager } from '../../dist/js/NotificationManager.js?v=20260409';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js?v=20260409';
        import { initPortalPoe } from '../../dist/js/pages/panel/poe.js?v=20260509';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                if (window.txt) translatePage();
                Auth.checkAccess([1, 2, 3, 4, 5, 6]);
                if (window.txt) {
                    await initMenu();
                    NotificationManager.init();
                    await initPortalPoe();
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light" style="font-family: Lato, sans-serif;" data-page-title-key="poe_portal">
    <div class="container my-4 px-3">
        <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-3 border-bottom pb-2">
            <div>
                <h4 class="fw-black m-0" data-i18n="comunicacion.poe_portal_titulo"></h4>
                <small class="text-muted d-block" data-i18n="comunicacion.poe_portal_sub"></small>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a href="./noticias.html" class="btn btn-outline-secondary btn-sm fw-bold flex-shrink-0">
                    <i class="bi bi-newspaper me-1"></i><span data-i18n="comunicacion.poe_btn_volver_noticias"></span>
                </a>
            </div>
        </div>

        <div id="poe-grid" class="row g-3"></div>
    </div>

    <div class="modal fade" id="modal-poe-detalle" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <div class="flex-grow-1" style="min-width:0">
                        <h5 class="modal-title fw-bold text-break" id="modal-poe-titulo"></h5>
                        <div class="small text-muted mt-1" id="modal-poe-meta"></div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-2">
                    <p class="small text-muted mb-2 d-none" id="modal-poe-resena"></p>
                    <div class="small text-dark mb-3" id="modal-poe-cuerpo" style="white-space: pre-wrap;"></div>
                    <div id="modal-poe-adjuntos" class="d-flex flex-wrap gap-2 mb-3"></div>
                    <button type="button" class="btn btn-outline-dark btn-sm fw-bold" id="btn-poe-qr">
                        <i class="bi bi-qr-code me-1"></i><span data-i18n="comunicacion.poe_btn_qr"></span>
                    </button>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-success fw-bold" data-bs-dismiss="modal" data-i18n="comunicacion.modal_cerrar"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="qrcode-buffer-poe" style="display:none;width:0;height:0;overflow:hidden;" aria-hidden="true"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
