<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte - GROBO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">
    <script type="module">
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js';
        import { Auth } from '../../dist/js/auth.js';
        import { initMenu } from '../../dist/js/components/MenuComponent.js?v=20260311';
        import { NotificationManager } from '../../dist/js/NotificationManager.js';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js';
        import { initSupportSoporte } from '../../dist/js/pages/usuario/supportSoporte.js';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                if (window.txt) translatePage();
                Auth.checkAccess([1, 2, 3, 4, 5, 6]);
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    initSupportSoporte();
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light" style="font-family: Lato, sans-serif;" data-page-title-key="soporte">
    <div class="container my-4 px-3">
        <div id="soporte-page-header" class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2 flex-wrap gap-2">
            <div>
                <h4 class="fw-black m-0" data-i18n="soporte.page_title"></h4>
                <small class="text-muted d-block" data-i18n="soporte.page_sub"></small>
            </div>
            <div class="d-flex gap-2 align-items-center flex-shrink-0">
                <button
                    type="button"
                    class="btn btn-outline-secondary btn-sm fw-bold"
                    id="btn-ayuda-soporte"
                    data-gecko-cap-help="panel/soporte"
                    data-gecko-cap-modal="#modal-soporte-help"
                >
                    <i class="bi bi-question-circle me-1"></i><span data-i18n="comunicacion.btn_ayuda"></span>
                </button>
                <button type="button" class="btn btn-success btn-sm fw-bold" id="btn-nuevo-ticket">
                    <i class="bi bi-ticket-perforated me-1"></i><span data-i18n="soporte.nuevo_ticket"></span>
                </button>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-12 col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div id="lista-tickets" class="list-group list-group-flush"></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-7">
                <div class="card shadow-sm border-0" id="panel-ticket-wrap">
                    <div class="card-body text-muted small" id="panel-ticket-placeholder" data-i18n="soporte.seleccione_ticket"></div>
                    <div class="card-body d-none" id="panel-ticket-cont">
                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-2">
                            <div>
                                <div class="fw-bold" id="ticket-asunto"></div>
                                <div class="small text-muted" id="ticket-meta"></div>
                            </div>
                            <span class="badge rounded-pill" id="ticket-estado-badge"></span>
                        </div>
                        <div id="ticket-turno-hint" class="alert alert-info py-2 px-3 small mb-3 d-none"></div>
                        <div id="ticket-mensajes" class="border rounded p-2 mb-3 bg-light" style="max-height: 380px; overflow-y: auto;"></div>
                        <div id="ticket-actions" class="d-flex flex-wrap gap-2 align-items-start">
                            <div class="flex-grow-1 d-none" id="wrap-reply">
                                <textarea class="form-control form-control-sm mb-2" id="reply-text" rows="3"></textarea>
                                <button type="button" class="btn btn-primary btn-sm fw-bold" id="btn-reply" data-i18n="soporte.responder"></button>
                            </div>
                            <button type="button" class="btn btn-outline-secondary btn-sm fw-bold d-none" id="btn-cerrar" data-i18n="soporte.cerrar_ticket"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-soporte-help" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold">
                        <i class="bi bi-question-circle me-2"></i><span data-i18n="soporte.cap_help_titulo"></span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <section class="mb-3">
                        <h6 class="fw-bold text-success text-uppercase small mb-2" data-i18n="soporte.cap_help_s1_title"></h6>
                        <p class="text-muted small mb-0" data-i18n="soporte.cap_help_s1_text"></p>
                    </section>
                    <hr class="text-muted opacity-25" />
                    <section class="mb-3">
                        <h6 class="fw-bold text-success text-uppercase small mb-2" data-i18n="soporte.cap_help_s2_title"></h6>
                        <p class="text-muted small mb-0" data-i18n="soporte.cap_help_s2_text"></p>
                    </section>
                    <hr class="text-muted opacity-25" />
                    <section class="mb-0">
                        <h6 class="fw-bold text-success text-uppercase small mb-2" data-i18n="soporte.cap_help_s3_title"></h6>
                        <p class="text-muted small mb-0" data-i18n="soporte.cap_help_s3_text"></p>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
