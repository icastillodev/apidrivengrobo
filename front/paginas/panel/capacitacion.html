<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitación - GROBO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">
    <style>
        body { font-family: Lato, sans-serif; }
        #cap-list .list-group-item.active { background-color: #198754; border-color: #198754; color: #fff; }
        .manual-topic ul { padding-left: 1.1rem; }
        .manual-topic p:last-child { margin-bottom: 0; }
        .manual-accordion .accordion-button { font-size: 0.9rem; }
        .manual-accordion .accordion-button:not(.collapsed) { background: rgba(25, 135, 84, 0.08); color: #146c43; }
    </style>
    <script type="module">
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js';
        import { Auth } from '../../dist/js/auth.js';
        import { initMenu } from '../../dist/js/components/MenuComponent.js?v=20260311';
        import { NotificationManager } from '../../dist/js/NotificationManager.js';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js';
        import { initCapacitacion } from '../../dist/js/pages/usuario/capacitacion.js';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                if (window.txt) translatePage();
                Auth.checkAccess([1, 2, 3, 4, 5, 6]);
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    await initCapacitacion();
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light" data-page-title-key="capacitacion">
    <div class="container-fluid py-4 px-3">
        <div class="mb-4 pb-2 border-bottom">
            <h1 class="h3 fw-black text-success mb-1" data-i18n="capacitacion.page_title"></h1>
            <p class="text-muted small mb-2" data-i18n="capacitacion.page_sub"></p>
            <div class="alert alert-info border-info py-2 px-3 small mb-0 shadow-sm" role="note" data-i18n="capacitacion.page_banner"></div>
        </div>
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-success text-white fw-bold py-2 small">
                        <i class="bi bi-collection me-1"></i><span data-i18n="capacitacion.library_heading"></span>
                    </div>
                    <div class="list-group list-group-flush overflow-auto" id="cap-list" style="max-height: min(70vh, 640px);"></div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white border-bottom py-2 d-flex align-items-center gap-2">
                        <i class="bi bi-book text-success"></i>
                        <span class="fw-bold small text-uppercase text-muted" data-i18n="capacitacion.content_heading"></span>
                    </div>
                    <div class="card-body">
                        <h2 class="h5 fw-bold text-dark mb-3" id="cap-content-title"></h2>
                        <div id="cap-content-body" class="small text-body" style="line-height: 1.6;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
