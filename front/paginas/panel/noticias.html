<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias - GROBO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">
    <style>
        .noticia-tarjeta {
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.2s ease, transform 0.15s ease;
            min-height: 280px;
        }
        .noticia-tarjeta:hover {
            box-shadow: 0 0.5rem 1.25rem rgba(25, 135, 84, 0.12) !important;
            transform: translateY(-2px);
        }
        .noticia-tarjeta .noticia-meta {
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .noticia-extracto {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.45;
        }
        .noticia-titulo {
            font-size: 1.05rem;
            line-height: 1.35;
        }
        #noticias-pag .page-link {
            min-width: 2.25rem;
            text-align: center;
        }
    </style>
    <script type="module">
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js';
        import { Auth } from '../../dist/js/auth.js';
        import { initMenu } from '../../dist/js/components/MenuComponent.js?v=20260311';
        import { NotificationManager } from '../../dist/js/NotificationManager.js';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js';
        import { initPortalNoticias } from '../../dist/js/pages/panel/noticias.js?v=20260402c';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                if (window.txt) translatePage();
                Auth.checkAccess([1, 2, 3, 4, 5, 6]);
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    initPortalNoticias();
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light" style="font-family: Lato, sans-serif;" data-page-title-key="noticias_portal">
    <div class="container my-4 px-3">
        <div class="mb-3 border-bottom pb-2">
            <h4 class="fw-black m-0" data-i18n="comunicacion.portal_titulo"></h4>
            <small class="text-muted" data-i18n="comunicacion.portal_sub"></small>
        </div>

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div class="btn-group" role="group" id="filtro-alcance">
                <button type="button" class="btn btn-outline-success btn-sm fw-bold active" data-alcance="local" data-i18n="comunicacion.filtro_local"></button>
                <button type="button" class="btn btn-outline-success btn-sm fw-bold" data-alcance="red" data-i18n="comunicacion.filtro_red"></button>
            </div>
            <div class="d-flex flex-wrap align-items-center gap-2">
                <input type="text" id="noticias-search" class="form-control form-control-sm" placeholder="Buscar noticias..." style="max-width: 15rem;">
                <label for="noticias-sort" class="small text-muted mb-0 text-nowrap" data-i18n="comunicacion.portal_sort_label"></label>
                <select id="noticias-sort" class="form-select form-select-sm" style="min-width: 14rem;" aria-label="sort"></select>
            </div>
        </div>

        <div id="noticias-grid" class="row row-cols-1 row-cols-lg-2 g-4"></div>

        <div class="mt-4 pt-4 border-top" id="noticias-pag-section">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
                <span class="text-muted small" id="noticias-pag-info"></span>
                <nav aria-label="Pagination">
                    <ul class="pagination pagination-sm mb-0 flex-wrap justify-content-center" id="noticias-pag"></ul>
                </nav>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-noticia" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-noticia-titulo"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="small text-muted mb-2 d-flex flex-wrap align-items-center gap-2" id="modal-noticia-meta"></div>
                    <div class="noticia-cuerpo" id="modal-noticia-cuerpo" style="white-space: pre-wrap;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal" data-i18n="comunicacion.modal_cerrar"></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
