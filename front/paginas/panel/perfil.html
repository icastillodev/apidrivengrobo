<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - GROBO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">

    <style>
        body { font-family: 'Lato', sans-serif; background-color: #f4f7f6; }
        .form-control:focus { border-color: #1a5d3b; box-shadow: 0 0 0 0.25rem rgba(26, 93, 59, 0.25); }
    </style>

<script type="module">
    import { Auth } from '../../dist/js/auth.js';
    import { API } from '../../dist/js/api.js';
    import { initMenu } from '../../dist/js/components/MenuComponent.js?v=20260311';
    import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js';
    import { NotificationManager } from '../../dist/js/NotificationManager.js';
    import { checkUrlParamsAndOpen } from '../../dist/js/components/UrlRouter.js';
    import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js';
    import { initProfile } from '../../dist/js/pages/usuario/perfil.js';

    document.addEventListener('DOMContentLoaded', async () => {
        showLoader();

        // 0. Hidratar sesión desde cookies ANTES de cualquier otra cosa (para no perder token al abrir perfil)
        Auth.hydrateSession();

        try {
            // 1. CARGA CRÍTICA: Idioma
            // Bloqueamos hasta que window.txt esté listo para las etiquetas del perfil
            await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null); 
            if (window.txt) translatePage();

// 2. VALIDACIÓN DE ACCESO (Niveles 1–6). Con skipInstCheck para no expulsar en perfil.
            if (!Auth.checkAccess([1, 2, 3, 4, 5, 6], { skipInstCheck: true })) {
                hideLoader();
                return;
            }

            // 3. INICIALIZACIÓN DE COMPONENTES
            if (window.txt) {
                initMenu();
                NotificationManager.init();
                
                // Inicialización de la lógica del Perfil (Carga de datos del usuario, etc.)
                initProfile();
                
                console.log("✅ Página de Perfil inicializada.");
            } else {
                throw new Error("El objeto de idioma window.txt no se generó.");
            }

            // 4. ROUTER (Delay de estabilidad para abrir tabs específicas si vienen por URL)
            setTimeout(() => {
                checkUrlParamsAndOpen();
            }, 300);

        } catch (error) {
            console.error("❌ Fallo en inicialización de Perfil:", error);
        } finally {
            hideLoader();
        }
    });
</script>
</head>
<body class="bg-light" data-page-title-key="perfil">
    <div class="container my-5 px-4">
        
        <div class="d-flex align-items-center mb-4 border-bottom pb-3">
            <h4 class="fw-bold mb-0 text-dark text-uppercase" data-i18n="perfil.titulo">Mi Perfil</h4>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm text-center h-100">
                    <div class="card-body p-5">
                        <div class="mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center bg-light rounded-circle text-success" style="width: 100px; height: 100px;">
                                <i class="bi bi-person-fill" style="font-size: 3rem;"></i>
                            </div>
                        </div>
                        <h5 class="fw-bold mb-1" id="lbl-nombre-completo"><span data-i18n="perfil.cargando">Cargando...</span></h5>
                        <p class="text-muted small mb-3" id="lbl-usuario">@usuario</p>
                        <span class="badge bg-success-subtle text-success-emphasis border border-success-subtle px-3 py-2" id="lbl-institucion">...</span>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-white border-0 py-3">
                        <h6 class="fw-bold text-primary mb-0"><i class="bi bi-pencil-square me-2"></i><span data-i18n="perfil.datos_personales">DATOS PERSONALES</span></h6>
                    </div>
                    <div class="card-body p-4">
                        <form id="form-personal">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted" data-i18n="perfil.label_nombre">Nombre</label>
                                    <input type="text" name="nombre" id="input-nombre" class="form-control fw-bold" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted" data-i18n="perfil.label_apellido">Apellido</label>
                                    <input type="text" name="apellido" id="input-apellido" class="form-control fw-bold" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted" data-i18n="perfil.label_email">Correo Electrónico</label>
                                    <input type="email" name="email" id="input-email" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted" data-i18n="perfil.label_celular">Celular / Teléfono</label>
                                    <input type="text" name="celular" id="input-celular" class="form-control">
                                </div>
                                <div class="col-12 text-end mt-4">
                                    <button type="submit" class="btn btn-primary fw-bold shadow-sm px-4" data-i18n="perfil.btn_guardar">GUARDAR CAMBIOS</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3">
                        <h6 class="fw-bold text-danger mb-0"><i class="bi bi-shield-lock me-2"></i><span data-i18n="perfil.seguridad">SEGURIDAD</span></h6>
                    </div>
                    <div class="card-body p-4">
                        <form id="form-security">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label small fw-bold text-muted" data-i18n="perfil.label_pass_actual">Contraseña Actual</label>
                                    <input type="password" id="pass-current" class="form-control" data-i18n="perfil.ph_pass_actual" placeholder="Ingrese su contraseña actual para confirmar" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted" data-i18n="perfil.label_nueva_pass">Nueva Contraseña</label>
                                    <input type="password" id="pass-new" class="form-control" data-i18n="perfil.ph_nueva_min" placeholder="Mínimo 6 caracteres" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted" data-i18n="perfil.label_confirmar_nueva">Confirmar Nueva</label>
                                    <input type="password" id="pass-confirm" class="form-control" data-i18n="perfil.ph_repetir_nueva" placeholder="Repita la nueva contraseña" required>
                                </div>
                                <div class="col-12 text-end mt-4">
                                    <button type="submit" class="btn btn-outline-danger fw-bold shadow-sm px-4" data-i18n="perfil.btn_actualizar_pass">ACTUALIZAR CONTRASEÑA</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
