<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas - GROBO</title>

    <script type="module">
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js';
        import { Auth } from '../../dist/js/auth.js';
        import { initMenu } from '../../dist/js/components/MenuComponent.js?v=20260311';
        import { NotificationManager } from '../../dist/js/NotificationManager.js';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js';
        import { initMisReservas } from '../../dist/js/pages/usuario/misreservas.js?v=20260331';

        showLoader();
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                if (window.txt) translatePage();

                Auth.checkAccess([1, 2, 3, 4, 5, 6]);

                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    initMisReservas();
                } else {
                    throw new Error("El objeto de idioma window.txt no se generó.");
                }
            } catch (error) {
                console.error("❌ Fallo en inicialización de Mis Reservas:", error);
            } finally {
                hideLoader();
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">

    <style>
        body { font-family: 'Lato', sans-serif; background-color: #f4f7f6; }
        .day-cell { width: 14.2857%; min-height: 86px; cursor: pointer; border: 1px solid rgba(0,0,0,.05); }
        .day-cell.disabled { cursor: not-allowed; opacity: .4; background: #fafafa; }
        .day-cell.available { background: rgba(25,135,84,.07); }
        .day-cell.selected { outline: 2px solid #198754; outline-offset: -2px; background: rgba(25,135,84,.12); }
        .slot-btn { font-size: 12px; }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid my-5 px-4 px-md-5">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div>
                <h4 class="fw-bold mb-0 text-dark" data-i18n="misreservas.titulo"></h4>
                <small class="text-muted" data-i18n="misreservas.subtitulo"></small>
            </div>
            <div class="d-flex gap-2">
                <button id="btn-refresh" class="btn btn-outline-secondary btn-sm fw-bold shadow-sm">
                    <i class="bi bi-arrow-repeat me-1"></i> <span data-i18n="misreservas.btn_actualizar"></span>
                </button>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12 col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label small fw-bold" data-i18n="misreservas.label_sala"></label>
                            <select id="select-sala" class="form-select fw-bold"></select>
                        </div>

                        <div class="d-flex justify-content-between align-items-center border-top pt-3">
                            <button class="btn btn-light btn-sm fw-bold" id="btn-prev-month">
                                <i class="bi bi-chevron-left"></i> <span data-i18n="misreservas.btn_anterior"></span>
                            </button>
                            <div class="fw-black text-uppercase small" id="calendar-title">—</div>
                            <button class="btn btn-light btn-sm fw-bold" id="btn-next-month">
                                <span data-i18n="misreservas.btn_siguiente"></span> <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>

                        <div class="mt-3">
                            <div class="d-flex text-muted small fw-bold">
                                <div class="text-center" style="width:14.2857%" data-i18n="misreservas.dow_lu"></div>
                                <div class="text-center" style="width:14.2857%" data-i18n="misreservas.dow_ma"></div>
                                <div class="text-center" style="width:14.2857%" data-i18n="misreservas.dow_mi"></div>
                                <div class="text-center" style="width:14.2857%" data-i18n="misreservas.dow_ju"></div>
                                <div class="text-center" style="width:14.2857%" data-i18n="misreservas.dow_vi"></div>
                                <div class="text-center" style="width:14.2857%" data-i18n="misreservas.dow_sa"></div>
                                <div class="text-center" style="width:14.2857%" data-i18n="misreservas.dow_do"></div>
                            </div>
                            <div id="calendar-grid" class="d-flex flex-wrap mt-1"></div>
                            <div id="calendar-hint" class="small text-muted mt-2" data-i18n="misreservas.hint_calendario"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div class="mb-3">
                            <div class="fw-black text-dark" data-i18n="misreservas.section_mis_reservas"></div>
                            <div class="small text-muted" data-i18n="misreservas.section_mis_reservas_desc"></div>
                            <div class="table-responsive mt-2 border rounded bg-white">
                                <table class="table table-sm table-hover align-middle mb-0" style="font-size: 12px;">
                                    <thead class="table-light text-uppercase small">
                                        <tr>
                                            <th data-i18n="misreservas.th_fecha"></th>
                                            <th data-i18n="misreservas.th_horario"></th>
                                            <th data-i18n="misreservas.th_sala"></th>
                                        </tr>
                                    </thead>
                                    <tbody id="table-mis-reservas"></tbody>
                                </table>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <div class="fw-black text-dark" data-i18n="misreservas.section_disponibilidad"></div>
                                <div class="small text-muted" id="selected-day-title">—</div>
                            </div>
                            <span class="badge bg-success-subtle text-success-emphasis border border-success-subtle" id="badge-sala">—</span>
                        </div>

                        <div class="row g-3">
                            <div class="col-12 col-lg-6">
                                <div class="border rounded p-3 bg-light">
                                    <div class="fw-bold small text-muted mb-2" data-i18n="misreservas.label_horarios"></div>
                                    <div id="slots-list" class="d-flex flex-wrap gap-2"></div>
                                    <div id="slots-empty" class="small text-muted d-none" data-i18n="misreservas.msg_sin_horarios"></div>
                                </div>
                            </div>
                            <div class="col-12 col-lg-6">
                                <div class="border rounded p-3 bg-light">
                                    <div class="fw-bold small text-muted mb-2" data-i18n="misreservas.label_instrumentos"></div>
                                    <div id="inst-list" class="d-flex flex-column gap-2"></div>
                                    <div id="inst-empty" class="small text-muted d-none" data-i18n="misreservas.msg_sin_instrumentos"></div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <div class="me-auto d-flex align-items-center gap-2 flex-wrap">
                                <div class="form-check form-switch m-0">
                                    <input class="form-check-input" type="checkbox" id="chk-repeat-weekly">
                                    <label class="form-check-label small fw-bold text-muted" for="chk-repeat-weekly" data-i18n="misreservas.repeat_weekly"></label>
                                </div>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="small text-muted" data-i18n="misreservas.repeat_until"></span>
                                    <input type="date" class="form-control form-control-sm" id="repeat-until" style="width: 160px;" disabled>
                                </div>
                                <span class="small text-muted" data-i18n="misreservas.repeat_hint"></span>
                            </div>
                            <div class="col-12 d-none" id="repeat-dias-wrap">
                                <div class="small fw-bold text-muted mb-1" data-i18n="misreservas.repeat_dias_label"></div>
                                <div class="d-flex flex-wrap gap-2" id="repeat-dias-checks">
                                    <div class="form-check form-check-inline m-0"><input class="form-check-input" type="checkbox" value="1" id="usr-dw1"><label class="form-check-label small" for="usr-dw1" data-i18n="misreservas.dow_lu"></label></div>
                                    <div class="form-check form-check-inline m-0"><input class="form-check-input" type="checkbox" value="2" id="usr-dw2"><label class="form-check-label small" for="usr-dw2" data-i18n="misreservas.dow_ma"></label></div>
                                    <div class="form-check form-check-inline m-0"><input class="form-check-input" type="checkbox" value="3" id="usr-dw3"><label class="form-check-label small" for="usr-dw3" data-i18n="misreservas.dow_mi"></label></div>
                                    <div class="form-check form-check-inline m-0"><input class="form-check-input" type="checkbox" value="4" id="usr-dw4"><label class="form-check-label small" for="usr-dw4" data-i18n="misreservas.dow_ju"></label></div>
                                    <div class="form-check form-check-inline m-0"><input class="form-check-input" type="checkbox" value="5" id="usr-dw5"><label class="form-check-label small" for="usr-dw5" data-i18n="misreservas.dow_vi"></label></div>
                                    <div class="form-check form-check-inline m-0"><input class="form-check-input" type="checkbox" value="6" id="usr-dw6"><label class="form-check-label small" for="usr-dw6" data-i18n="misreservas.dow_sa"></label></div>
                                    <div class="form-check form-check-inline m-0"><input class="form-check-input" type="checkbox" value="7" id="usr-dw7"><label class="form-check-label small" for="usr-dw7" data-i18n="misreservas.dow_do"></label></div>
                                </div>
                                <div id="repeat-validacion" class="small mt-2 text-muted d-none"></div>
                            </div>
                            <button class="btn btn-outline-secondary fw-bold" id="btn-clear" type="button">
                                <i class="bi bi-x-circle me-1"></i> <span data-i18n="misreservas.btn_limpiar"></span>
                            </button>
                            <button class="btn btn-success fw-bold" id="btn-reservar" type="button" disabled>
                                <i class="bi bi-check-circle me-1"></i> <span data-i18n="misreservas.btn_reservar"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
