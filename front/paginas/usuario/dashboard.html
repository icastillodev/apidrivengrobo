<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROBO - Panel de Investigador</title>
    
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="../../dist/style/css/styles.css">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">
</head>

<body class="bg-gray-50 font-sans">

    <main class="container mx-auto mt-6 p-6">
        
        <section class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 mb-6">
            <div class="max-w-3xl">
                <h1 class="text-3xl font-black text-gray-900 italic tracking-tighter mb-2">
                    Hola <span id="welcome-name" class="text-primary">Investigador</span>, Bienvenido al Bioterio
                </h1>
                <p class="text-gray-500 font-medium leading-relaxed mb-0">
                    Panel de investigador <strong>GROBO</strong>. Utilice el menú de navegación para iniciar nuevas solicitudes, revisar el estado de sus formularios y gestionar sus protocolos activos.
                </p>
            </div>
        </section>

        <div class="row g-4" id="dashboard-grid">
            <div class="col-12 text-center text-muted py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 fw-bold tracking-widest text-uppercase text-[10px]">Cargando módulos...</p>
            </div>
        </div>

    </main>

    <script type="module">
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js';
        import { Auth } from '../../dist/js/auth.js';
        import { API } from '../../dist/js/api.js';
        import { initMenu } from '../../dist/js/components/MenuComponent.js';
        import { NotificationManager } from '../../dist/js/NotificationManager.js';
        import { checkUrlParamsAndOpen } from '../../dist/js/components/UrlRouter.js';
        import { loadLanguage } from '../../dist/js/utils/i18n.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();

            try {
                // 1. CARGA CRÍTICA: Idioma
                await loadLanguage(); 

                // 2. VALIDACIÓN DE ACCESO (Nivel 3 - Usuario Investigador)
                Auth.checkAccess([3]); 

                // 3. SALUDO PERSONALIZADO (A prueba de errores)
                const userName = localStorage.getItem('userName');
                const welcomeSpan = document.getElementById('welcome-name');
                if (welcomeSpan) {
                    const primerNombre = userName ? userName.split(' ')[0] : 'Investigador';
                    welcomeSpan.innerText = primerNombre;
                }

                // 4. INICIALIZACIÓN DE COMPONENTES
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    
                    // 🚀 CARGAMOS EL DASHBOARD ESPECÍFICO DE USUARIO
                    import('../../dist/js/pages/usuario/dashboard.js')
                        .then(module => module.DashboardUI.init())
                        .catch(e => console.error("Error al arrancar el motor del Dashboard de Usuario:", e));

                } else {
                    console.warn("El sistema de idioma no se inicializó correctamente.");
                }

                // 5. ROUTER (Delay de estabilidad para parámetros de URL)
                setTimeout(() => {
                    checkUrlParamsAndOpen();
                }, 300);

            } catch (error) {
                console.error("❌ Fallo en la inicialización de la página:", error);
            } finally {
                hideLoader();
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
