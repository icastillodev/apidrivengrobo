<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajería institucional - GROBO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">
    <style>
        #nuevo-dest option.mensajes-dest-inst-banner {
            font-weight: 700;
            font-size: 0.72rem;
            letter-spacing: 0.02em;
            color: #0d6efd;
            background-color: #e7f1ff;
        }
    </style>
    <script type="module">
        import { showLoader, hideLoader } from '../../dist/js/components/LoaderComponent.js';
        import { Auth } from '../../dist/js/auth.js';
        import { initMenu } from '../../dist/js/components/MenuComponent.js?v=20260311';
        import { NotificationManager } from '../../dist/js/NotificationManager.js';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js';
        import { initMensajes } from '../../dist/js/pages/usuario/mensajes.js?v=20260402b';

        document.addEventListener('DOMContentLoaded', async () => {
            showLoader();
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                if (window.txt) translatePage();
                Auth.checkAccess([1, 2, 3, 4, 5, 6]);
                if (window.txt) {
                    initMenu();
                    NotificationManager.init();
                    initMensajes({ alcance: 'institucional' });
                }
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        });
    </script>
</head>
<body class="bg-light" style="font-family: Lato, sans-serif;" data-page-title-key="mensajes_institucion">
    <div class="container my-4 px-3">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
            <div>
                <h4 class="fw-black m-0" data-i18n="comunicacion.msg_page_title_inst"></h4>
                <small class="text-muted d-block" data-i18n="comunicacion.msg_page_subtitle_inst"></small>
            </div>
            <button type="button" class="btn btn-success btn-sm fw-bold" id="btn-nuevo-msg">
                <i class="bi bi-envelope-plus me-1"></i><span data-i18n="comunicacion.msg_nuevo"></span>
            </button>
        </div>

        <div class="row g-3">
            <div class="col-12 col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div id="lista-hilos" class="list-group list-group-flush"></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-7">
                <div class="card shadow-sm border-0" id="panel-hilo-wrap">
                    <div class="card-body text-muted small" id="panel-hilo-placeholder" data-i18n="comunicacion.msg_hilos_vacio"></div>
                    <div class="card-body d-none" id="panel-hilo-cont">
                        <div class="fw-bold mb-2" id="hilo-asunto"></div>
                        <div class="small text-muted mb-3" id="hilo-meta"></div>
                        <div id="hilo-mensajes" class="border rounded p-2 mb-3 bg-light" style="max-height: 360px; overflow-y: auto;"></div>
                        <p id="hilo-solo-lectura" class="small text-muted d-none mb-2" data-i18n="comunicacion.msg_inst_solo_lectura"></p>
                        <div id="hilo-reply-wrap" class="d-flex gap-2">
                            <textarea class="form-control form-control-sm" id="reply-text" rows="2"></textarea>
                            <button type="button" class="btn btn-primary btn-sm align-self-end" id="btn-reply" data-i18n="comunicacion.msg_responder"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-nuevo" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" data-i18n="comunicacion.msg_nuevo"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="msg-nuevo-inst-tipo-block" class="mb-3 d-none">
                        <label class="form-label small fw-bold" data-i18n="comunicacion.msg_inst_tipo_label"></label>
                        <select class="form-select form-select-sm" id="nuevo-inst-tipo"></select>
                        <small class="text-muted d-block mt-1" data-i18n="comunicacion.msg_inst_tipo_help"></small>
                    </div>
                    <div id="msg-nuevo-dest-block">
                        <label class="form-label small fw-bold" data-i18n="comunicacion.msg_destinatario"></label>
                        <label for="nuevo-dest-filter" class="form-label small text-muted mb-0" data-i18n="comunicacion.msg_dest_filtro"></label>
                        <input type="search" class="form-control form-control-sm mb-1" id="nuevo-dest-filter" autocomplete="off" data-i18n="comunicacion.msg_dest_filtro_ph">
                        <select class="form-select mb-2" id="nuevo-dest" size="8" style="max-height: 220px;"></select>
                    </div>
                    <label class="form-label small fw-bold" data-i18n="comunicacion.msg_asunto"></label>
                    <input type="text" class="form-control mb-2" id="nuevo-asunto" maxlength="255">
                    <div id="msg-nuevo-cat-block">
                        <label class="form-label small fw-bold" data-i18n="comunicacion.msg_categoria"></label>
                        <select class="form-select mb-2" id="nuevo-categoria"></select>
                    </div>
                    <label class="form-label small fw-bold" data-i18n="comunicacion.admin_cuerpo"></label>
                    <textarea class="form-control" id="nuevo-cuerpo" rows="4"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="btn-enviar-nuevo" data-i18n="comunicacion.msg_enviar"></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
