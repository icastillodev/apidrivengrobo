<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada - GROBO</title>
    <link rel="icon" href="./dist/multimedia/imagenes/grobo/favicon.ico" type="icon">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-center items-center text-center p-4 gecko-loaded">

    <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full border-t-4 border-amber-500">
        <h1 class="text-6xl font-black text-gray-200 mb-4">404</h1>
        <h2 class="text-2xl font-bold text-gray-800 mb-2 uppercase" data-i18n="error404.titulo">¡Ups! Te perdiste</h2>
        <p class="text-gray-500 mb-8 text-sm" data-i18n="error404.descripcion">La página que buscas no existe o no tienes acceso.</p>

        <div id="status-msg" class="animate-pulse mb-6 text-amber-600 font-bold text-xs uppercase tracking-widest">
            Analizando credenciales...
        </div>
        
        <button id="manual-redirect" class="hidden bg-black text-white px-6 py-3 rounded-lg font-bold uppercase text-xs tracking-widest hover:bg-gray-800 transition-all" data-i18n="error404.btn_volver">
            Volver al Sitio
        </button>
        <p class="mt-4 text-[10px] text-gray-400">
            <span class="font-bold uppercase">Idioma</span>
            <span class="inline-flex ml-2 rounded border border-amber-500/50">
                <button type="button" class="px-2 py-1 text-xs font-bold hover:bg-amber-100" onclick="localStorage.setItem('lang','es');localStorage.setItem('idioma','es');location.reload();">ES</button>
                <button type="button" class="px-2 py-1 text-xs font-bold hover:bg-amber-100" onclick="localStorage.setItem('lang','en');localStorage.setItem('idioma','en');location.reload();">EN</button>
                <button type="button" class="px-2 py-1 text-xs font-bold hover:bg-amber-100" onclick="localStorage.setItem('lang','pt');localStorage.setItem('idioma','pt');location.reload();">PT</button>
            </span>
        </p>
    </div>

<script type="module">
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const basePath = isLocal ? '/URBE-API-DRIVEN/front/' : '/';

        const statusMsg = document.getElementById('status-msg');
        const manualBtn = document.getElementById('manual-redirect');
        const t = () => window.txt?.error404;

        async function run404() {
            try {
                const { loadLanguage, translatePage } = await import(basePath + 'dist/js/utils/i18n.js');
                const lang = localStorage.getItem('lang') || localStorage.getItem('idioma') || null;
                await loadLanguage(lang);
                if (window.txt) translatePage();
            } catch (e) { console.warn('i18n:', e); }

            statusMsg.innerText = (t()?.analizando) || "Analizando credenciales...";

            const authModule = await import(basePath + 'dist/js/auth.js');
            const Auth = authModule.Auth;

            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const role = parseInt(localStorage.getItem('userLevel') || sessionStorage.getItem('userLevel'));

            if (token && !isNaN(role)) {
                statusMsg.innerText = (t()?.sesion_activa) || "Sesión activa. Redirigiendo al Dashboard...";
                setTimeout(() => Auth.autoRedirectIfLogged(role), 1000);
            } else {
                statusMsg.innerText = (t()?.volviendo_inicio) || "No hay sesión. Volviendo al inicio...";
                const savedInst = localStorage.getItem('NombreInst') || sessionStorage.getItem('NombreInst');
                let targetUrl = basePath;
                if (savedInst && savedInst !== 'superadmin' && savedInst !== 'SISTEMA GLOBAL') {
                    targetUrl = `${basePath}${savedInst}/`;
                }
                setTimeout(() => { window.location.href = targetUrl; }, 2000);
                manualBtn.onclick = () => window.location.href = targetUrl;
                manualBtn.classList.remove('hidden');
            }
        }
        run404().catch(err => {
            console.error("Error crítico:", err);
            window.location.href = basePath;
        });
    </script>
</body>
</html>
