<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formularios de Registro - Maestro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style media="print">
        .no-print { display: none !important; }
        .modal { position: static !important; }
        .modal-dialog { max-width: 100% !important; margin: 0 !important; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { initFormAdmin } from '../../dist/js/pages/superadmin/formRegistroManager.js';
        import { initSuperMenu } from '../../dist/js/components/SuperMenuComponent.js';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js';
        import { SuperAuth } from '../../dist/js/superAuth.js';
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                translatePage();
            } catch (e) { /* i18n opcional */ }
            if (SuperAuth.checkMasterAccess([1])) {
                initSuperMenu();
                initFormAdmin();
            }
        });
    </script>
</head>
<body class="bg-slate-50">
    <div class="container-fluid py-5 px-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="font-black text-slate-800 uppercase italic mb-0" data-i18n="superadmin_formulario.titulo">Gestión de Links de Registro</h5>
                <button class="btn btn-dark btn-sm font-bold" onclick="window.openCreateLinkModal()"><span data-i18n="superadmin_formulario.btn_crear">+ CREAR NUEVO LINK</span></button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" style="font-size: 12px;">
                        <thead class="table-light text-muted uppercase">
                            <tr>
                                <th data-i18n="superadmin_formulario.th_id">ID</th>
                                <th data-i18n="superadmin_formulario.th_inst_previa">Institución Previa</th>
                                <th data-i18n="superadmin_formulario.th_encargado">Encargado</th>
                                <th data-i18n="superadmin_formulario.th_slug">Slug / URL</th>
                                <th data-i18n="superadmin_formulario.th_progreso">Progreso</th>
                                <th data-i18n="superadmin_formulario.th_fecha_creacion">Fecha Creación</th>
                                <th class="text-center" data-i18n="superadmin_formulario.th_acciones">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="table-body-forms"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-detalle-form" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title font-bold" data-i18n="superadmin_formulario.modal_titulo">DETALLES COMPLETADOS POR LA INSTITUCIÓN</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div id="content-detalle-eav" class="modal-body bg-light p-4" style="max-height: 70vh; overflow-y: auto;">
                    </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
