<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin - GROBO Devs</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="../../dist/style/css/tailwind.css">

    <style>
        body { font-family: 'Lato', sans-serif; background-color: #f4f7f6; }
        .breadcrumb-item + .breadcrumb-item::before { content: "/"; color: #dee2e6; }
        .table-hover tbody tr:hover { background-color: #f2f2f2 !important; cursor: pointer; }
        .badge-gecko { background-color: #1a5d3b !important; }
        .page-link { color: #1a5d3b; border: none; margin: 0 2px; border-radius: 4px; }
        .page-item.active .page-link { background-color: #1a5d3b !important; border: none; }
    </style>

    <script type="module">
        import { initSuperMenu } from '../../dist/js/components/SuperMenuComponent.js';
        import { DashboardSuperUI } from '../../dist/js/pages/superadmin/dashboard_superadmin.js';
        import { loadLanguage, translatePage } from '../../dist/js/utils/i18n.js';
        import { SuperAuth } from '../../dist/js/superAuth.js';
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await loadLanguage(localStorage.getItem('lang') || localStorage.getItem('idioma') || null);
                translatePage();
            } catch (e) { /* i18n opcional */ }
            if (SuperAuth.checkMasterAccess([1])) {
                initSuperMenu();
                const main = document.getElementById('superadmin-dashboard-main');
                if (main) {
                    main.innerHTML = '<div class="row g-4" id="superadmin-grid"></div>';
                    DashboardSuperUI.init();
                }
            }
        });
    </script>
</head>
<body class="gecko-loaded">
<div class="container my-5">
    <div id="superadmin-dashboard-main" class="card shadow-sm border-0 p-4 p-md-5">
        <div class="text-center py-5 text-muted"><span class="spinner-border spinner-border-sm me-2"></span>Cargando...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
